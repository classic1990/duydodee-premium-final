<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>มาใหม่วันนี้ | DUYดูDEE-HD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        .Thai-font {
            font-family: 'Kanit', sans-serif;
        }
    </style>
</head>

<body class="bg-brand-black text-white Thai-font">
    <!-- Navbar (Will be injected by UI.initNavbar) -->
    <nav id="main-nav"
        class="fixed top-0 inset-x-0 z-[1000] transition-all duration-500 px-6 py-4 flex items-center justify-between">
    </nav>

    <main class="pt-32 pb-20 px-6 container mx-auto">
        <header class="mb-12">
            <div class="flex items-center gap-3 text-brand-primary mb-2">
                <span class="w-12 h-[2px] bg-brand-primary"></span>
                <span class="text-[10px] font-black uppercase tracking-[0.3em]">Fresh Arrivals</span>
            </div>
            <h1 class="text-4xl md:text-5xl font-black italic uppercase tracking-tighter">มาใหม่วันนี้ <span
                    class="text-brand-primary text-2xl not-italic">●</span></h1>
            <p class="text-gray-500 mt-4 max-w-xl text-sm leading-relaxed">
                อัปเดตล่าสุดภาพยนตร์และซีรีส์ใหม่ที่เพิ่งเข้าสู่ระบบวันนี้ ไม่พลาดทุกความบันเทิงที่สดใหม่ที่สุด</p>
        </header>

        <!-- Filter Bar -->
        <div class="flex flex-wrap gap-4 mb-10 pb-4 border-b border-white/5">
            <button data-filter="all"
                class="filter-btn active px-6 py-2.5 rounded-xl bg-brand-primary text-black text-xs font-black uppercase tracking-widest transition-all">ทั้งหมด</button>
            <button data-filter="movie"
                class="filter-btn px-6 py-2.5 rounded-xl bg-white/5 text-gray-400 text-xs font-black uppercase tracking-widest hover:bg-white/10 transition-all">เฉพาะหนัง</button>
            <button data-filter="series"
                class="filter-btn px-6 py-2.5 rounded-xl bg-white/5 text-gray-400 text-xs font-black uppercase tracking-widest hover:bg-white/10 transition-all">เฉพาะซีรีส์</button>
        </div>

        <!-- Content Grid -->
        <div id="trending-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-6 md:gap-8">
            <!-- Skeleton or Content -->
        </div>

        <div id="empty-state" class="hidden flex flex-col items-center justify-center py-20 text-center">
            <div class="w-20 h-20 bg-white/5 rounded-full flex items-center justify-center mb-4"><i data-lucide="frown"
                    class="w-10 h-10 text-gray-700"></i></div>
            <p class="text-gray-500 font-bold uppercase tracking-widest text-xs">ขออภัย ยังไม่มีข้อมูลใหม่ในส่วนนี้</p>
        </div>
    </main>

    <div id="main-footer"></div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="module" src="/src/pages/trending.js"></script>
</body>

</html>
