<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Lost in Cinema | DUYDODEE</title>

    <!-- ⚡ Font Preloading (Critical Assets) -->
    <link rel="stylesheet" href="/css/output.css">
    <link rel="stylesheet" href="/css/fonts.css">
    <script src="https://unpkg.com/lucide@0.410.0"></script>
    <style>
        body { background-color: #0b0b0d; overflow: hidden; }
        .glow-bg {
            background: radial-gradient(circle at 50% 50%, rgba(0, 150, 255, 0.1) 0%, transparent 70%);
            filter: blur(80px);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen text-white font-['Kanit']">
    <!-- Ambient Background Elements -->
    <div class="fixed inset-0 glow-bg pointer-events-none"></div>
    <div class="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] bg-blue-500/10 rounded-full blur-[120px]"></div>

    <div class="relative z-10 text-center px-6">
        <div class="mb-4 relative inline-block">
            <h1 class="text-[12rem] font-['Montserrat'] font-black leading-none tracking-tighter opacity-10 select-none">404</h1>
            <div class="absolute inset-0 flex items-center justify-center">
                <i data-lucide="clapperboard" class="w-24 h-24 text-brand-primary animate-pulse"></i>
            </div>
        </div>

        <h2 class="text-3xl font-bold mb-4 tracking-tight">หลุดออกนอกเฟรม...</h2>
        <p class="text-gray-400 max-w-md mx-auto mb-10 font-light">
            ดูเหมือนว่าหน้าเนื้อหาที่คุณกำลังตามหาจะถูกลบออกไป หรือ URL อาจจะไม่ถูกต้อง ลองกลับไปเริ่มต้นใหม่ที่หน้าหลักนะครับ
        </p>

        <div class="flex flex-wrap items-center justify-center gap-4">
            <a href="" class="group flex items-center gap-3 px-8 py-4 bg-brand-primary text-black font-black rounded-2xl hover:scale-105 active:scale-95 transition-all shadow-[0_0_30px_rgba(0,180,255,0.3)]">
                <i data-lucide="home" class="w-5 h-5"></i>
                กลับหน้าหลัก
            </a>
            <button id="open-search-btn" class="flex items-center gap-3 px-8 py-4 bg-white/10 border border-white/20 text-white font-bold rounded-2xl hover:bg-brand-primary hover:text-black hover:border-brand-primary transition-all">
                <i data-lucide="search" class="w-5 h-5"></i>
                ค้นหาเนื้อหา
            </button>
            <button onclick="history.back()" class="flex items-center gap-3 px-8 py-4 bg-black/40 backdrop-blur-md border border-brand-primary/20 text-white font-bold rounded-2xl hover:bg-white/10 transition-all">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
                ถอยกลับ
            </button>
        </div>
    </div>

    <!-- 🔍 Search Modal -->
    <div id="search-modal" class="fixed inset-0 z-[100] hidden items-start justify-center p-4 sm:p-10 bg-black/90 backdrop-blur-xl animate-fade-in overflow-y-auto">
        <div class="w-full max-w-4xl bg-brand-obsidian border border-white/10 rounded-[2.5rem] shadow-2xl overflow-hidden animate-slide-up mt-10">
            <!-- Header -->
            <div class="p-6 border-b border-white/5 flex items-center gap-4">
                <i data-lucide="search" class="w-6 h-6 text-brand-primary"></i>
                <input type="text" id="modal-search-input" placeholder="ค้นหาชื่อหนัง หรือหมวดหมู่ที่ต้องการ..." 
                       class="flex-1 bg-transparent border-none outline-none text-xl text-white Thai-font placeholder-gray-700">
                <button id="close-search-btn" class="w-10 h-10 flex items-center justify-center rounded-xl bg-white/5 text-gray-500 hover:text-white transition-all">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>
            
            <!-- Results Area -->
            <div id="modal-results-container" class="p-8 min-h-[300px]">
                <div id="search-placeholder" class="text-center py-10">
                    <i data-lucide="clapperboard" class="w-12 h-12 text-gray-800 mx-auto mb-4"></i>
                    <p class="text-gray-600 Thai-font font-bold">พิมพ์ชื่อเรื่องเพื่อเริ่มค้นหาทันที</p>
                </div>
                <div id="modal-results-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4 hidden">
                    <!-- Search Results will be injected here -->
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { db, collection, getDocs, SCHEMA, getMediaWatchPath } from '/src/services/firebase.js';
        import { UI } from '/src/components/ui.js';

        let allContent = [];
        const modal = document.getElementById('search-modal');
        const input = document.getElementById('modal-search-input');
        const resultsGrid = document.getElementById('modal-results-grid');
        const placeholder = document.getElementById('search-placeholder');

        // 🛠️ 1. Fetch Data once on modal open
        async function initData() {
            if (allContent.length > 0) return;
            UI.setLoading(true);
            try {
                const [mSnap, sSnap] = await Promise.all([
                    getDocs(collection(db, SCHEMA.COLLECTIONS.MOVIES)),
                    getDocs(collection(db, SCHEMA.COLLECTIONS.SERIES))
                ]);
                allContent = [
                    ...mSnap.docs.map(d => ({ id: d.id, type: 'movie', ...d.data() })),
                    ...sSnap.docs.map(d => ({ id: d.id, type: 'series', ...d.data() }))
                ];
            } catch (err) { console.error(err); }
            finally { UI.setLoading(false); }
        }

        // 🖱️ 2. Event Listeners
        document.getElementById('open-search-btn').onclick = async () => {
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            input.focus();
            await initData();
        };

        document.getElementById('close-search-btn').onclick = () => {
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        };

        // 🔍 3. Search Logic
        input.addEventListener('input', UI.debounce((e) => {
            const term = e.target.value.trim().toLowerCase();
            if (!term) {
                resultsGrid.classList.add('hidden');
                placeholder.classList.remove('hidden');
                return;
            }

            const filtered = allContent.filter(item => 
                item.title?.toLowerCase().includes(term) || 
                item.category?.toLowerCase().includes(term)
            );

            renderResults(filtered);
        }, 300));

        function renderResults(results) {
            placeholder.classList.add('hidden');
            resultsGrid.classList.remove('hidden');

            if (results.length === 0) {
                resultsGrid.innerHTML = `<div class="col-span-full py-10 text-center text-gray-600 Thai-font font-bold uppercase tracking-widest">ไม่พบเนื้อหาที่ต้องการ</div>`;
                return;
            }

            resultsGrid.innerHTML = results.map(item => {
                const watchUrl = getMediaWatchPath(item.category, item.type, item.id);
                return `
                    <div class="movie-card group cursor-pointer" onclick="location.href='${watchUrl}'">
                        <div class="movie-poster-wrapper !rounded-2xl">
                            <img src="${item.poster}" class="movie-poster-img" onerror="this.src='/assets/logo/DUYDODEE.png'">
                            <div class="movie-card-overlay flex items-center justify-center">
                                <div class="w-10 h-10 rounded-full bg-brand-primary flex items-center justify-center scale-75 group-hover:scale-100 transition-all duration-300">
                                    <i data-lucide="play" class="w-5 h-5 text-white fill-current"></i>
                                </div>
                            </div>
                        </div>
                        <div class="mt-2 px-1 text-center">
                            <h4 class="text-[10px] font-bold text-white group-hover:text-brand-primary transition-colors line-clamp-1 Thai-font uppercase tracking-tighter">${UI.escapeHTML(item.title)}</h4>
                        </div>
                    </div>
                `;
            }).join('');
            UI.refreshIcons();
        }

        // Global Icons Initial
        UI.refreshIcons();
    </script>
</body>
</html>
