<!DOCTYPE html>

<head>

        <div class="container mx-auto px-4 md:px-6 h-full flex items-center justify-between gap-4">
            <a href="/" class="flex items-center gap-2 md:gap-3 group flex-shrink-0">
                <img src="/assets/logo/DUYDODEE.png" alt="DUYดูDEE Logo" class="w-8 h-8 md:w-10 md:h-10 rounded-lg shadow-xl group-hover:scale-105 transition-transform">
                <span class="text-xl md:text-2xl font-heading font-black text-white tracking-tighter uppercase hidden sm:block">DUY<span class="text-brand-primary">ดูDEE</span></span>
            </a>

            <div class="hidden lg:flex items-center gap-8 text-sm font-bold text-gray-300">
                <a href="/" class="hover:text-brand-primary transition-colors Thai-font">หน้าแรก</a>
                <a href="/category.html?cat=vertical" class="hover:text-brand-primary transition-colors flex items-center gap-2 Thai-font">
                    ซีรีส์แนวตั้ง 
                    <span class="relative px-2 py-0.5 text-[8px] bg-brand-primary text-black rounded-sm uppercase tracking-wider font-black overflow-hidden">
                        Hot<div class="border-beam"></div>
                    </span>
                </a>
                <a href="/category.html?cat=chinese" class="hover:text-brand-primary transition-colors Thai-font">ซีรีส์จีนพากย์ไทย</a>
            </div>

            <div class="flex items-center gap-4 md:gap-6 flex-1 justify-end lg:flex-none">
                <div id="user-profile-area"></div>
            </div>
        </div>
    </nav>

    <!-- 📱 Mobile Bottom Navigation -->
    <nav class="lg:hidden fixed bottom-0 left-0 right-0 bg-brand-obsidian/95 backdrop-blur-xl border-t border-white/10 z-[500] pb-safe">
        <div class="flex items-center justify-around px-2 py-2">
            <a href="/" class="flex flex-col items-center gap-1 p-2 text-gray-500 hover:text-white transition-colors">
                <i data-lucide="home" class="w-5 h-5"></i>
                <span class="text-[9px] font-bold Thai-font">หน้าแรก</span>
            </a>
            <a href="/category.html?cat=vertical" class="flex flex-col items-center gap-1 p-2 text-gray-500 hover:text-white transition-colors">
                <i data-lucide="smartphone" class="w-5 h-5"></i>
                <span class="text-[9px] font-bold Thai-font">แนวตั้ง</span>
            </a>
            <a href="/category.html?cat=chinese" class="flex flex-col items-center gap-1 p-2 text-gray-500 hover:text-white transition-colors">
                <i data-lucide="tv" class="w-5 h-5"></i>
                <span class="text-[9px] font-bold Thai-font">ซีรีส์จีน</span>
            </a>
            <div id="user-profile-area-mobile"></div>
        </div>
    </nav>

    <!-- 🌌 Cinematic Background -->
    <div class="fixed inset-0 z-0 pointer-events-none">
        <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1574267432553-4b4628081c31?q=80&w=2066&auto=format&fit=crop')] bg-cover bg-center opacity-20 grayscale-[0.5]"></div>
        <div class="absolute inset-0 bg-gradient-to-br from-brand-black via-brand-black/90 to-transparent"></div>
        <div class="absolute inset-0 bg-[radial-gradient(circle_at_50%_50%,rgba(251,191,36,0.05),transparent_70%)]"></div>
    </div>

    <main class="relative z-10 flex-grow layout-container py-8 md:py-12">
        <div class="max-w-2xl mx-auto space-y-8 animate-slide-up">
            
            <div class="flex items-center gap-4">
                <a href="/profile.html" class="w-10 h-10 flex items-center justify-center rounded-xl bg-white/5 border border-white/10 hover:bg-brand-primary hover:text-black transition-all">
                    <i data-lucide="chevron-left" class="w-5 h-5"></i>
                </a>
                <h1 class="text-2xl md:text-4xl font-black text-white Thai-font uppercase tracking-tight italic">ตั้งค่า <span class="text-brand-primary">โปรไฟล์</span></h1>
            </div>

            <!-- 🧊 Edit Profile Card -->
            <div class="glass-premium p-8 md:p-12 relative overflow-hidden group">
                <div class="absolute -top-24 -right-24 w-64 h-64 bg-brand-primary/5 blur-[100px] rounded-full group-hover:bg-brand-primary/10 transition-all duration-1000"></div>
                
                <form id="edit-profile-form" class="space-y-8 relative z-10">
                    <!-- Avatar Upload -->
                    <div class="flex flex-col items-center gap-6">
                        <div class="relative group cursor-pointer avatar-trigger">
                            <div class="absolute -inset-1 bg-gradient-to-tr from-brand-primary/40 to-transparent rounded-[2rem] blur opacity-30 group-hover:opacity-100 transition-opacity"></div>
                            <img id="avatar-preview" src="/assets/logo/DUYDODEE.png" class="relative w-32 h-32 rounded-[1.8rem] object-cover border-4 border-white/5 shadow-2xl group-hover:border-brand-primary/50 transition-all">
                            <div class="absolute inset-0 bg-black/60 rounded-[1.8rem] opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity">
                                <i data-lucide="camera" class="w-8 h-8 text-white"></i>
                            </div>
                            <input type="file" id="avatar-input" class="hidden" accept="image/*">
                        </div>
                        <div class="text-center space-y-1">
                            <p class="text-[10px] font-black text-brand-primary uppercase tracking-[0.3em]">Change Avatar</p>
                            <p class="text-[9px] font-bold text-gray-500 uppercase tracking-widest">Max 2MB (JPG, PNG)</p>
                        </div>
                    </div>

                    <!-- Form Fields -->
                    <div class="space-y-6">
                        <div class="space-y-2">
                            <label for="display-name" class="text-[10px] font-black text-gray-500 uppercase tracking-widest ml-1">ชื่อที่ใช้แสดง</label>
                            <div class="relative group/input">
                                <i data-lucide="user" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-600 group-focus-within/input:text-brand-primary transition-colors"></i>
                                <input type="text" id="display-name" autocomplete="name" class="w-full bg-black/40 border border-white/5 rounded-2xl py-3.5 pl-12 pr-4 text-white text-sm outline-none focus:border-brand-primary/50 focus:bg-black/60 transition-all Thai-font placeholder-gray-700" placeholder="ระบุชื่อของคุณ" required>
                            </div>
                        </div>

                        <div class="space-y-2 opacity-50">
                            <label for="email" class="text-[10px] font-black text-gray-500 uppercase tracking-widest ml-1">อีเมลผู้ใช้งาน (ไม่สามารถเปลี่ยนได้)</label>
                            <div class="relative">
                                <i data-lucide="mail" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-700"></i>
                                <input type="email" id="email" class="w-full bg-black/20 border border-white/5 rounded-2xl py-3.5 pl-12 pr-4 text-gray-500 text-sm outline-none cursor-not-allowed" readonly>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn-primary w-full !mt-10 py-4 shadow-[0_0_20px_rgba(251,191,36,0.2)] hover:shadow-[0_0_30px_rgba(251,191,36,0.4)] flex items-center justify-center gap-2">
                        <span>บันทึกการเปลี่ยนแปลง</span>
                        <i data-lucide="save" class="w-4 h-4"></i>
                    </button>
                </form>
            </div>
        </div>
    </main>

    <footer class="border-t border-white/5 bg-brand-black/50 pt-12 pb-8 mt-auto relative z-10">
        <div class="container mx-auto px-6 text-center">
            <div class="flex flex-col items-center gap-6">
                <div class="flex items-center gap-3">
                    <img src="/assets/logo/DUYDODEE.png" alt="DUYดูDEE Logo" class="w-10 h-10 rounded-xl">

                </div>

                    <a href="#" class="hover:text-brand-primary transition-all">Privacy Policy</a>
                    <a href="#" class="hover:text-brand-primary transition-all">Terms of Service</a>
                    <a href="#" class="hover:text-brand-primary transition-all">Contact Us</a>
                </div>
                <p class="text-gray-800 text-[8px] font-black uppercase tracking-[0.4em]">© 2026 DUYดูDEE ENTERTAINMENT. ALL RIGHTS RESERVED.</p>
            </div>
        </div>

        lucide.createIcons();
