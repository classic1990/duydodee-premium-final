<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แก้ไขโปรไฟล์ | DUYดูDEE PREMIUM</title>
    <link rel="stylesheet" href="/css/output.css">
    <link rel="stylesheet" href="/css/fonts.css">
    <link rel="icon" type="image/png" href="/assets/logo/DUYDODEE.png">
    <script src="https://unpkg.com/lucide@0.410.0"></script>
</head>
<body class="bg-brand-black text-gray-200 selection:bg-brand-primary/30">

    <nav class="nav-glass h-16 md:h-20 z-[500] sticky top-0">
        <div class="container mx-auto px-6 h-full flex items-center justify-between">
            <a href="/" class="flex items-center gap-3 group">
                <img src="/assets/logo/DUYDODEE.png" alt="DUYดูDEE Logo" class="w-10 h-10 rounded-lg shadow-xl group-hover:scale-105 transition-transform">
                <span class="text-2xl font-heading font-black text-white tracking-tighter uppercase">DUY<span class="text-brand-primary">ดูDEE</span></span>
            </a>
        </div>
    </nav>

    <main class="layout-container py-12 md:py-24">
        <div class="max-w-2xl mx-auto space-y-10 animate-slide-up">
            <div class="flex items-center gap-6">
                <a href="/profile.html" class="w-12 h-12 flex items-center justify-center rounded-2xl bg-white/5 border border-white/10 hover:bg-brand-primary hover:text-black transition-all">
                    <i data-lucide="chevron-left" class="w-6 h-6"></i>
                </a>
                <h1 class="text-4xl font-black text-white Thai-font uppercase tracking-tight italic">ตั้งค่าโปรไฟล์</h1>
            </div>

            <div class="glass-premium p-8 md:p-12 !rounded-[3rem] space-y-8 relative overflow-hidden">
                <div class="absolute top-0 right-0 w-64 h-64 bg-brand-primary/5 blur-[100px] rounded-full pointer-events-none"></div>
                
                <form id="edit-profile-form" class="space-y-10 relative z-10">
                    <div class="flex flex-col items-center gap-6">
                        <div class="relative group cursor-pointer avatar-trigger">
                            <div class="absolute -inset-1 bg-gradient-to-tr from-brand-primary/40 to-transparent rounded-[2.5rem] blur opacity-30 group-hover:opacity-100 transition-opacity"></div>
                            <img id="avatar-preview" src="/assets/logo/DUYDODEE.png" class="relative w-32 h-32 rounded-[2.2rem] object-cover border-4 border-white/5 shadow-2xl group-hover:border-brand-primary/50 transition-all">
                            <div class="absolute inset-0 bg-black/60 rounded-[2.2rem] opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity">
                                <i data-lucide="camera" class="w-8 h-8 text-white"></i>
                            </div>
                            <input type="file" id="avatar-input" class="hidden" accept="image/*">
                        </div>
                        <div class="text-center space-y-1">
                            <p class="text-[10px] font-black text-brand-primary uppercase tracking-[0.3em]">Change Identity</p>
                            <p class="text-[9px] font-bold text-gray-500 uppercase tracking-widest">สูงสุดไม่เกิน 2MB</p>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 gap-8">
                        <div class="space-y-3">
                            <label for="display-name" class="text-[10px] font-black text-gray-500 uppercase tracking-[0.4em] ml-2">Public Display Name</label>
                            <div class="relative group">
                                <i data-lucide="user" class="absolute left-6 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-500 group-focus-within:text-brand-primary transition-colors"></i>
                                <input type="text" id="display-name" class="w-full bg-black/40 border border-white/10 rounded-2xl py-5 pl-14 pr-6 text-white outline-none focus:border-brand-primary/50 transition-all Thai-font text-sm font-bold" placeholder="ระบุชื่อของคุณ..." required>
                            </div>
                        </div>
                        <div class="space-y-3 opacity-60">
                            <label for="email" class="text-[10px] font-black text-gray-500 uppercase tracking-[0.4em] ml-2">Permanent Email</label>
                            <div class="relative">
                                <i data-lucide="mail" class="absolute left-6 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-600"></i>
                                <input type="email" id="email" class="w-full bg-black/20 border border-white/5 rounded-2xl py-5 pl-14 pr-6 text-gray-500 outline-none cursor-not-allowed text-sm font-bold" readonly>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="w-full py-5 bg-brand-primary text-black font-black uppercase tracking-[0.3em] rounded-2xl shadow-[0_20px_50px_rgba(251,191,36,0.2)] hover:scale-[1.02] active:scale-95 transition-all Thai-font text-xs">
                        บันทึกการเปลี่ยนแปลง <span class="ml-2 opacity-30">|</span> Save Changes
                    </button>
                </form>
            </div>
        </div>
    </main>

    <footer class="py-12 text-center opacity-30">
        <p class="text-[9px] font-black uppercase tracking-[0.5em]">© 2026 DUYดูDEE PREMIUM. ALL RIGHTS RESERVED.</p>
    </footer>

</body>
</html>
