<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จัดการรีวิว | DUYดูDEE ADMIN</title>
    <link rel="stylesheet" href="/css/output.css">
    <link rel="stylesheet" href="/css/fonts.css">
    <script src="https://unpkg.com/lucide@0.410.0"></script>
</head>
<body class="bg-brand-black text-white selection:bg-brand-primary/50">
    <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-64 bg-brand-obsidian border-r border-white/5 transform -translate-x-full lg:translate-x-0 transition-transform duration-300"></aside>
    
    <main class="flex-1 lg:ml-64 p-6 md:p-10 space-y-8">
        <header class="flex justify-between items-end">
            <div>
                <h1 class="text-3xl font-black uppercase italic tracking-tighter Thai-font">Review <span class="text-brand-primary">Management</span></h1>
                <p class="text-gray-500 text-xs Thai-font uppercase tracking-widest">จัดการและตรวจสอบรีวิวในระบบ</p>
            </div>
            <div class="flex items-center gap-3">
                <span id="review-count" class="px-4 py-2 bg-white/5 rounded-xl border border-white/10 text-[10px] font-black Thai-font">รีวิวทั้งหมด: 0</span>
                <span id="reported-count" class="px-4 py-2 bg-red-500/20 rounded-xl border border-red-500/40 text-[10px] font-black Thai-font">รายงาน: 0</span>
            </div>
        </header>

        <!-- 🔍 Filter Tabs -->
        <div class="flex gap-2">
            <button class="filter-btn active px-6 py-3 bg-brand-primary text-black text-xs font-black uppercase rounded-xl border border-brand-primary" data-filter="all">
                ทั้งหมด
            </button>
            <button class="filter-btn px-6 py-3 bg-white/5 text-white text-xs font-black uppercase rounded-xl border border-white/10 hover:bg-white/10 transition-all" data-filter="reported">
                รายงาน
            </button>
            <button class="filter-btn px-6 py-3 bg-white/5 text-white text-xs font-black uppercase rounded-xl border border-white/10 hover:bg-white/10 transition-all" data-filter="recent">
                ล่าสุด
            </button>
        </div>

        <!-- 📋 Reviews Grid -->
        <div id="reviews-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            <!-- Reviews will be loaded here -->
        </div>

        <!-- Loading State -->
        <div id="loading-state" class="hidden">
            <div class="flex flex-col items-center justify-center py-20 space-y-4">
                <div class="w-12 h-12 border-2 border-brand-primary/20 border-t-brand-primary rounded-full animate-spin"></div>
                <p class="text-gray-500 text-xs">กำลังโหลด...</p>
            </div>
        </div>

        <!-- Empty State -->
        <div id="empty-state" class="hidden">
            <div class="flex flex-col items-center justify-center py-20 space-y-4">
                <div class="w-16 h-16 bg-white/5 rounded-full flex items-center justify-center">
                    <i data-lucide="message-circle" class="w-8 h-8 text-gray-600"></i>
                </div>
                <p class="text-gray-500 text-xs Thai-font">ไม่พบรีวิว</p>
            </div>
        </div>
    </main>

    <script type="module" src="/src/admin/admin-reviews.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
