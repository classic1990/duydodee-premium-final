<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ประวัติการชำระเงิน VIP | DUYดูDEE EXECUTIVE</title>
    <link rel="stylesheet" href="/css/output.css">
    <link rel="stylesheet" href="/css/fonts.css">
    <link rel="icon" type="image/png" href="assets/logo/DUYDODEE.png">
    <script src="https://unpkg.com/lucide@0.410.0"></script>
    <script>
        const meta = document.createElement('meta');
        meta.name = 'theme-color';
        meta.content = '#050507';
        document.head.appendChild(meta);
    </script>
</head>

<body class="bg-brand-black text-white selection:bg-brand-primary/50">

    <!-- 🧭 Navigation Sidebar -->
    <aside id="sidebar"
        class="fixed left-0 top-0 bottom-0 w-80 bg-[#08080a]/80 backdrop-blur-3xl border-r border-white/5 z-[450] flex flex-col transition-transform duration-500 -translate-x-full lg:translate-x-0">
    </aside>

    <!-- Mobile Overlay -->
    <div id="admin-overlay" class="fixed inset-0 bg-black/50 z-[400] hidden lg:hidden"></div>

    <!-- 👑 Main Content Area -->
    <main class="lg:ml-80 min-h-screen p-8 md:p-16 relative z-10">
        <header class="mb-8">
            <h1 class="text-h1 heading-highlight">ประวัติ <span class="text-brand-primary">การชำระเงิน</span></h1>
            <p class="text-[9px] font-black text-gray-600 uppercase tracking-[0.4em] mt-1 Thai-font">
                จัดการและตรวจสอบรายการธุรกรรม VIP ทั้งหมด</p>
        </header>

        <!-- Mobile Toggle -->
        <button id="sidebar-toggle-btn"
            class="lg:hidden fixed top-5 left-5 z-[500] p-3 rounded-full bg-[#08080a]/80 backdrop-blur-xl border border-white/10 text-white hover:text-brand-primary transition-all"
            aria-label="เปิดเมนูนำทาง" title="เปิดเมนูนำทาง">
            <i data-lucide="menu" class="w-6 h-6"></i>
        </button>

        <!-- 🔍 Search and Status Filters -->
        <div class="flex flex-wrap gap-4 mb-8">
            <input type="text" id="filter-search" placeholder="ค้นหาชื่อผู้โอน..."
                class="bg-black/40 border border-white/10 rounded-xl py-3 px-4 text-white text-[10px] outline-none focus:border-brand-primary transition-all Thai-font w-64">
            <select id="filter-status"
                class="bg-black/40 border border-white/10 rounded-xl py-3 px-4 text-white text-[10px] outline-none focus:border-brand-primary transition-all Thai-font"
                aria-label="กรองสถานะการชำระเงิน" title="กรองสถานะการชำระเงิน">
                <option value="ALL">ทุกสถานะ</option>
                <option value="pending">รอตรวจสอบ</option>
                <option value="confirmed">ยืนยันแล้ว</option>
            </select>
        </div>

        <!-- 📊 Transactions Table -->
        <section class="bg-black/40 backdrop-blur-md border border-brand-primary/20 rounded-2xl overflow-hidden border border-white/5">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr
                        class="bg-white/[0.02] border-b border-white/5 text-[9px] font-black text-gray-500 uppercase tracking-widest Thai-font">
                        <th class="p-4">ผู้ใช้งาน</th>
                        <th class="p-4 text-center">ช่องทาง</th>
                        <th class="p-4 text-center">จำนวนเงิน</th>
                        <th class="p-4 text-center">สถานะ</th>
                        <th class="p-4 text-center">วันที่</th>
                        <th class="p-4 text-right">ดำเนินการ</th>
                    </tr>
                </thead>
                <tbody id="payment-history-list" class="divide-y divide-white/[0.03]">
                    <!-- Data Injected via JavaScript -->
                </tbody>
            </table>
        </section>
    </main>

    <!-- ⚡ Logic Script -->
    <script type="module" src="/src/admin/admin-vip-payments.js"></script>
</body>

</html>
