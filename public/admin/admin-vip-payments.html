<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1024, initial-scale=0.5, maximum-scale=1.0">
    <title>ประวัติการชำระเงิน VIP | DUYดูDEE EXECUTIVE</title>
    <link rel="stylesheet" href="/css/output.css">
    <link rel="stylesheet" href="/css/fonts.css">
    <link rel="icon" type="image/png" href="/assets/logo/DUYDODEE.png">
    <script src="https://unpkg.com/lucide@0.410.0"></script>
    <meta name="theme-color" content="#050507">
</head>
<body class="bg-[#050507] text-gray-400 antialiased font-body overflow-x-hidden">

    <aside class="fixed left-0 top-0 bottom-0 w-80 bg-[#08080a]/80 backdrop-blur-3xl border-r border-white/5 z-[450] flex flex-col">
        <div class="p-10 border-b border-white/5">
            <div class="flex items-center gap-4 group cursor-pointer" onclick="location.href='/'">
                <img src="/assets/logo/DUYDODEE.png" class="w-12 h-12 rounded-xl">
                <div>
                    <h3 class="text-xl font-black text-white uppercase tracking-tighter leading-none">DUY<span class="text-brand-primary">ดูDEE</span></h3>
                    <p class="text-[8px] font-black text-gray-600 uppercase tracking-[0.4em] mt-1 Thai-font">ADMIN CONTROL</p>
                </div>
            </div>
        </div>
        <nav class="flex-1 px-6 py-10 space-y-2">
            <a href="/admin/admin-manage.html" class="flex items-center gap-4 px-5 py-4 rounded-2xl transition-all hover:bg-white/5">
                <i data-lucide="layout-grid" class="w-5 h-5"></i>
                <span class="text-xs font-black uppercase tracking-widest Thai-font">แดชบอร์ด</span>
            </a>
            <a href="/admin/admin-vip-payments.html" class="flex items-center gap-4 px-5 py-4 rounded-2xl bg-brand-primary/10 text-white border-r-2 border-brand-primary nav-link-active">
                <i data-lucide="wallet" class="w-5 h-5 text-brand-primary"></i>
                <span class="text-xs font-black uppercase tracking-widest Thai-font">ประวัติการชำระ VIP</span>
            </a>
        </nav>
        <div class="p-8 mt-auto border-t border-white/5">
            <button onclick="location.href='/'" class="w-full py-4 rounded-2xl bg-white/5 border border-white/10 text-[9px] font-black text-gray-500 uppercase tracking-widest hover:bg-brand-primary hover:text-black transition-all flex items-center justify-center gap-2">
                <i data-lucide="external-link" class="w-3 h-3"></i> กลับไปหน้าเว็บหลัก
            </button>
        </div>
    </aside>

    <main class="lg:ml-80 min-h-screen p-8 md:p-16 relative z-10">
        <header class="mb-8">
            <h1 class="text-h1 heading-highlight">ประวัติ <span class="text-brand-primary">การชำระเงิน</span></h1>
            <p class="text-[9px] font-black text-gray-600 uppercase tracking-[0.4em] mt-1 Thai-font">จัดการและตรวจสอบรายการธุรกรรม VIP ทั้งหมด</p>
        </header>

        <!-- Filters -->
        <div class="flex flex-wrap gap-4 mb-8">
            <input type="text" id="filter-search" placeholder="ค้นหาชื่อผู้โอน..." class="bg-black/40 border border-white/10 rounded-xl py-3 px-4 text-white text-[10px] outline-none focus:border-brand-primary transition-all Thai-font w-64">
            <select id="filter-status" class="bg-black/40 border border-white/10 rounded-xl py-3 px-4 text-white text-[10px] outline-none focus:border-brand-primary transition-all Thai-font">
                <option value="ALL">ทุกสถานะ</option>
                <option value="pending">รอตรวจสอบ</option>
                <option value="confirmed">ยืนยันแล้ว</option>
            </select>
        </div>

        <section class="glass-premium rounded-2xl overflow-hidden border border-white/5">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-white/[0.02] border-b border-white/5 text-[9px] font-black text-gray-500 uppercase tracking-widest Thai-font">
                        <th class="p-4">ผู้ใช้งาน</th>
                        <th class="p-4 text-center">ช่องทาง</th>
                        <th class="p-4 text-center">จำนวนเงิน</th>
                        <th class="p-4 text-center">สถานะ</th>
                        <th class="p-4 text-center">วันที่</th>
                        <th class="p-4 text-right">ดำเนินการ</th>
                    </tr>
                </thead>
                <tbody id="payment-history-list" class="divide-y divide-white/[0.03]">
                    <!-- Data Injected -->
                </tbody>
            </table>
        </section>
    </main>

    <script type="module" src="/src/admin/admin-vip-payments.js"></script>
</body>
</html>
