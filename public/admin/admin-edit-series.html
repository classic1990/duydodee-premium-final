<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1024, initial-scale=0.5, maximum-scale=1.0">
    <title>แก้ไขซีรีส์ | DUYดูDEE EXECUTIVE</title>
    <link rel="stylesheet" href="/css/output.css">
    <link rel="stylesheet" href="/css/fonts.css">
    <link rel="icon" type="image/png" href="/assets/logo/DUYDODEE.png">
    
    <!-- 🎨 Lucide Icons -->
    <script src="https://unpkg.com/lucide@0.410.0"></script>
    <meta name="theme-color" content="#050507">
</head>
<body class="bg-brand-black text-white selection:bg-brand-primary/50">

    <!-- Mobile Overlay for Sidebar -->
    <div id="admin-overlay" class="fixed inset-0 bg-black/50 z-[400] hidden lg:hidden"></div>

    <!-- 🧭 SIDEBAR -->
    <aside id="sidebar" class="fixed left-0 top-0 bottom-0 w-80 bg-[#08080a]/80 backdrop-blur-3xl border-r border-white/5 z-[450] transition-transform duration-500 -translate-x-full lg:translate-x-0 flex flex-col"></aside>

    <main class="lg:ml-80 min-h-screen p-8 md:p-16 relative z-10">
        <!-- Mobile Sidebar Toggle -->
        <button id="sidebar-toggle-btn" class="lg:hidden fixed top-5 left-5 z-[500] p-3 rounded-full bg-[#08080a]/80 backdrop-blur-xl border border-white/10 text-white hover:text-brand-primary transition-all">
            <i data-lucide="menu" class="w-5 h-5"></i>
        </button>
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-8 mb-12">
            <div class="flex items-center gap-6">
                <a href="/admin/admin-manage-series.html" class="w-12 h-12 flex items-center justify-center rounded-2xl bg-white/5 border border-white/10 hover:bg-brand-primary hover:text-black transition-all">
                    <i data-lucide="chevron-left" class="w-6 h-6"></i>
                </a>
                <div>
                    <h1 class="text-4xl font-black text-white uppercase tracking-tighter italic Thai-font">แก้ไข <span class="text-brand-primary">ซีรีส์</span></h1>
                    <p class="text-[10px] font-black text-gray-600 uppercase tracking-[0.6em] mt-2 Thai-font">ปรับปรุงข้อมูลซีรีส์และตอนทั้งหมดในระบบ</p>
                </div>
            </div>
            <button id="delete-btn" class="px-8 py-4 bg-red-500/10 border border-red-500/20 text-red-500 text-xs font-black uppercase tracking-widest rounded-2xl hover:bg-red-500 hover:text-white transition-all Thai-font">
                <i data-lucide="trash-2" class="w-4 h-4 inline-block mr-2"></i> ลบซีรีส์นี้
            </button>
        </header>

        <form id="edit-series-form" class="grid grid-cols-1 xl:grid-cols-12 gap-12">
            <div class="xl:col-span-8 space-y-10">
                <!-- Section: Basic Info -->
                <div class="cyber-card p-10 space-y-8">
                    <div class="flex items-center gap-4">
                        <div class="w-1.5 h-6 bg-brand-primary rounded-full"></div>
                        <h2 class="text-lg font-black text-white uppercase tracking-widest Thai-font">ข้อมูลพื้นฐานซีรีส์</h2>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-gray-500 uppercase tracking-widest ml-2 Thai-font">ชื่อซีรีส์</label>
                            <input type="text" id="title" class="w-full bg-black/40 border border-white/10 rounded-2xl py-4 px-6 text-white outline-none focus:border-brand-primary transition-all Thai-font" placeholder="ระบุชื่อซีรีส์ภาษาไทย..." required>
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-gray-500 uppercase tracking-widest ml-2 Thai-font">หมวดหมู่</label>
                            <select id="category" class="w-full bg-black/40 border border-white/10 rounded-2xl py-4 px-6 text-white outline-none focus:border-brand-primary transition-all Thai-font appearance-none">
                                <option value="ซีรีส์แนวตั้ง">ซีรีส์แนวตั้ง (ตอนยาว)</option>
                                <option value="ซีรีส์จีนพากย์ไทย">ซีรีส์จีนพากย์ไทย</option>
                            </select>
                        </div>
                        <div class="md:col-span-2 space-y-2">
                            <label class="text-[10px] font-black text-gray-500 uppercase tracking-widest ml-2 Thai-font">เรื่องย่อ</label>
                            <textarea id="description" class="w-full bg-black/40 border border-white/10 rounded-2xl py-4 px-6 text-white outline-none focus:border-brand-primary transition-all Thai-font min-h-[120px] resize-none" placeholder="ระบุรายละเอียดซีรีส์..."></textarea>
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-gray-500 uppercase tracking-widest ml-2 Thai-font">ป้ายกำกับ (Badge)</label>
                        <input type="text" id="badge" class="w-full bg-black/40 border border-white/10 rounded-2xl py-4 px-6 text-white outline-none focus:border-brand-primary transition-all Thai-font" placeholder="เช่น Hot, New">
                    </div>
                </div>

                <!-- Section: Episodes -->
                <div class="cyber-card p-10 space-y-8">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-4">
                            <div class="w-1.5 h-6 bg-blue-500 rounded-full"></div>
                            <h2 class="text-lg font-black text-white uppercase tracking-widest Thai-font">การจัดการตอน (EPISODES)</h2>
                        </div>
                        <button type="button" id="add-episode-btn" class="px-6 py-2 bg-blue-500/10 border border-blue-500/20 text-blue-400 text-[10px] font-black uppercase tracking-widest rounded-xl hover:bg-blue-500 hover:text-white transition-all Thai-font">
                            + เพิ่มตอนใหม่
                        </button>
                    </div>
                    
                    <div id="episode-container" class="space-y-4">
                        <!-- Episode list will be injected here -->
                    </div>
                </div>

                <div class="flex flex-col md:flex-row gap-4 pt-4">
                    <button type="submit" id="submit-btn" class="flex-1 py-5 bg-brand-primary text-black text-xs font-black uppercase tracking-widest rounded-2xl shadow-xl hover:scale-[1.02] transition-transform active:scale-95 Thai-font">
                        อัปเดตซีรีส์และตอนทั้งหมด
                    </button>
                    <a href="/admin/admin-manage-series.html" class="px-10 py-5 bg-white/5 border border-white/10 text-gray-400 text-xs font-black uppercase tracking-widest rounded-2xl hover:bg-white/10 transition-all text-center Thai-font">
                        ยกเลิก
                    </a>
                </div>
            </div>

            <!-- Preview Column -->
            <div class="xl:col-span-4">
                <div class="cyber-card p-8 sticky top-8">
                    <h3 class="text-center text-[10px] font-black text-gray-600 uppercase tracking-[0.3em] mb-10 Thai-font">ตัวอย่างหน้าปก</h3>
                    
                    <div class="device-frame mx-auto scale-90">
                        <div class="device-screen relative overflow-hidden bg-black">
                            <img id="poster-preview" src="" class="w-full h-full object-cover opacity-0 transition-opacity duration-700" loading="lazy">
                        </div>
                    </div>

                    <div class="mt-10 space-y-6">
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-gray-500 uppercase tracking-widest ml-2">ลิงก์รูปภาพหน้าปก</label>
                            <input type="url" id="selected-poster-url" class="w-full bg-black/40 border border-white/10 rounded-2xl py-4 px-6 text-white outline-none focus:border-brand-primary transition-all Thai-font text-xs" placeholder="https://..." required>
                        </div>
                        <div id="thumbnail-options-container" class="flex gap-3 overflow-x-auto pb-4 scrollbar-hide"></div>
                    </div>
                </div>
            </div>
        </form>
    </main>

    <script type="module" src="/src/admin/admin-edit-series.js"></script>
</body>
</html>
