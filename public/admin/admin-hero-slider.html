<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จัดการเนื้อหาแนะนำ (Hero Slider) | แอดมิน</title>
    <link rel="stylesheet" href="/css/output.css">

    <!-- ⚡ PERFORMANCE: Critical Asset Preloading -->
    <!-- [Fonts: Plus Jakarta Sans - Headings] -->
    <!-- [Fonts: IBM Plex Sans Thai - Body & Content] -->
    <!-- [Fonts: Kanit - UI Elements & Badges] -->
    <link rel="stylesheet" href="/css/fonts.css">
    <script src="https://unpkg.com/lucide@0.410.0"></script>
</head>
<body class="bg-brand-black text-white selection:bg-brand-primary/50">
    
    <!-- Mobile Overlay for Sidebar -->
    <div id="admin-overlay" class="fixed inset-0 bg-black/50 z-[400] hidden lg:hidden"></div>

    <!-- 🧭 SIDEBAR -->
    <aside id="sidebar" class="fixed left-0 top-0 bottom-0 w-80 bg-[#08080a]/80 backdrop-blur-3xl border-r border-white/5 z-[450] transition-transform duration-500 -translate-x-full lg:translate-x-0 flex flex-col"></aside>

    <main class="lg:ml-80 min-h-screen p-8 md:p-16 relative z-10">
        <!-- Mobile Sidebar Toggle -->
        <button id="sidebar-toggle-btn" class="lg:hidden fixed top-5 left-5 z-[500] p-3 rounded-full bg-[#08080a]/80 backdrop-blur-xl border border-white/10 text-white hover:text-brand-primary transition-all">
            <i data-lucide="menu" class="w-5 h-5"></i>
        </button>

        <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-8 mb-16">
            <div>
                <h1 class="text-5xl md:text-6xl font-black text-white uppercase tracking-tighter italic Thai-font">จัดการ <span class="text-brand-primary">HERO SLIDER</span></h1>
                <p class="text-[10px] font-black text-gray-600 uppercase tracking-[0.6em] mt-2 Thai-font">ปรับเปลี่ยนเนื้อหาแนะนำเด่นๆ บนหน้าแรก</p>
            </div>
            <button id="add-slide-btn" class="px-8 py-4 bg-brand-primary text-black text-xs font-black uppercase tracking-widest rounded-2xl shadow-[0_15px_30px_rgba(251,191,36,0.2)] hover:scale-105 transition-transform flex items-center gap-2 Thai-font">
                <i data-lucide="plus" class="w-4 h-4"></i> เพิ่มสไลด์ใหม่
            </button>
        </header>

        <!-- Slides List -->
        <div id="hero-slides-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            <!-- Slides will be loaded here -->
        </div>
    </main>

    <!-- Edit Modal (Cyber Style) -->
    <div id="hero-modal" class="fixed inset-0 z-[500] hidden items-center justify-center p-6 bg-black/90 backdrop-blur-xl">
        <div class="w-full max-w-xl bg-[#0f0f13] border border-white/10 rounded-[3rem] p-10 shadow-2xl animate-fade-in relative overflow-hidden">
            <div class="absolute top-0 right-0 p-8">
                <button id="close-modal" class="text-gray-500 hover:text-white transition-colors"><i data-lucide="x" class="w-6 h-6"></i></button>
            </div>
            
            <h2 class="text-3xl font-black text-white mb-8 Thai-font uppercase italic tracking-tighter">ตั้งค่า <span class="text-brand-primary">สไลด์พรีเมียม</span></h2>
            
            <form id="hero-form" class="space-y-6">
                <input type="hidden" id="hero-id">
                <div class="space-y-2">
                    <label class="text-[9px] font-black text-gray-600 uppercase tracking-[0.4em] ml-2">หัวข้อเด่น (Headline)</label>
                    <input type="text" id="hero-title" class="w-full bg-black/40 border border-white/5 rounded-2xl py-4 px-6 text-white outline-none focus:border-brand-primary/50 transition-all Thai-font" placeholder="เช่น อัปเดตหนังใหม่ประจำสัปดาห์" required>
                </div>
                <div class="space-y-2">
                    <label class="text-[9px] font-black text-gray-600 uppercase tracking-[0.4em] ml-2">คำอธิบายโปรโมท</label>
                    <textarea id="hero-desc" class="w-full bg-black/40 border border-white/5 rounded-2xl py-4 px-6 text-white outline-none focus:border-brand-primary/50 h-28 resize-none Thai-font" placeholder="บอกเล่าความน่าสนใจของเนื้อหานี้..."></textarea>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-[9px] font-black text-gray-600 uppercase tracking-[0.4em] ml-2">รูปพื้นหลัง (URL)</label>
                        <input type="text" id="hero-image" class="w-full bg-black/40 border border-white/5 rounded-2xl py-4 px-6 text-white outline-none focus:border-brand-primary/50 transition-all text-xs" placeholder="https://..." required>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[9px] font-black text-gray-600 uppercase tracking-[0.4em] ml-2">ลิงก์ปลายทาง</label>
                        <input type="text" id="hero-link" class="w-full bg-black/40 border border-white/5 rounded-2xl py-4 px-6 text-white outline-none focus:border-brand-primary/50 transition-all text-xs" placeholder="/watch-movie?id=..." required>
                    </div>
                </div>
                <div class="space-y-2">
                    <label class="text-[9px] font-black text-gray-600 uppercase tracking-[0.4em] ml-2">ลำดับการแสดงผล</label>
                    <input type="number" id="hero-order" class="w-full bg-black/40 border border-white/5 rounded-2xl py-4 px-6 text-white outline-none focus:border-brand-primary/50 transition-all" value="0">
                </div>
                <div class="flex gap-4 pt-6">
                    <button type="submit" class="flex-1 py-5 bg-brand-primary text-black font-black uppercase tracking-widest rounded-2xl shadow-lg shadow-brand-primary/20 hover:scale-105 transition-all Thai-font">ยืนยันการบันทึก</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="/src/admin/admin-hero-slider.js"></script>
</body>
</html>
