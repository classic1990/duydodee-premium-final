<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ความปลอดภัยระบบ | DUYดูDEE EXECUTIVE</title>
    <link rel="stylesheet" href="/css/output.css">
    <link rel="stylesheet" href="/css/fonts.css">
    <link rel="icon" type="image/png" href="assets/logo/DUYDODEE.png">
    
    <!-- 🎨 Lucide Icons -->
    <script src="https://unpkg.com/lucide@0.410.0"></script>
    <meta name="theme-color" content="#050507">
</head>
<body class="bg-brand-black text-white selection:bg-brand-primary/50">

    <!-- Mobile Overlay for Sidebar -->
    <div id="admin-overlay" class="fixed inset-0 bg-black/50 z-[400] hidden lg:hidden"></div>

    <!-- 🧭 SIDEBAR -->
    <aside class="fixed left-0 top-0 bottom-0 w-80 bg-[#08080a]/80 backdrop-blur-3xl border-r border-white/5 z-[450] transition-transform duration-500 -translate-x-full lg:translate-x-0 flex flex-col" id="sidebar"></aside>

    <main class="lg:ml-80 min-h-screen p-8 md:p-16 relative z-10">
        <!-- Mobile Sidebar Toggle -->
        <button id="sidebar-toggle-btn" class="lg:hidden fixed top-5 left-5 z-[500] p-3 rounded-full bg-[#08080a]/80 backdrop-blur-xl border border-white/10 text-white hover:text-brand-primary transition-all">
            <i data-lucide="menu" class="w-5 h-5"></i>
        </button>

        <header class="mb-8">
            <h1 class="text-h1 heading-highlight">ความปลอดภัย <span class="text-brand-primary">ระบบ</span></h1>
            <p class="text-[9px] font-black text-gray-600 uppercase tracking-[0.4em] mt-1 Thai-font">การตั้งค่าความปลอดภัยและดูแลรักษาฐานข้อมูล</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <!-- 🛡️ Purge Logic -->
            <div class="bg-black/40 backdrop-blur-md border border-brand-primary/20 p-8 space-y-6 border-red-900/20">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 rounded-xl bg-red-500/10 border border-red-500/20 flex items-center justify-center">
                        <i data-lucide="trash-2" class="w-5 h-5 text-red-500"></i>
                    </div>
                    <div>
                        <h2 class="text-h3">ล้างข้อมูลทั้งหมด (Purge)</h2>
                        <p class="text-[9px] font-black text-red-500/50 uppercase tracking-widest Thai-font">ไม่สามารถย้อนคืนได้</p>
                    </div>
                </div>
                <button id="purge-btn" class="w-full py-4 rounded-xl bg-red-600 text-white text-xs font-black uppercase tracking-widest hover:bg-red-500 transition-all shadow-xl shadow-red-900/20 Thai-font">
                    ยืนยันการล้างข้อมูลระบบ
                </button>
            </div>

            <!-- 💳 Payment Account Settings -->
            <div class="bg-black/40 backdrop-blur-md border border-brand-primary/20 p-8 space-y-6">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 rounded-xl bg-brand-primary/10 border border-brand-primary/20 flex items-center justify-center">
                        <i data-lucide="wallet" class="w-5 h-5 text-brand-primary"></i>
                    </div>
                    <div>
                        <h2 class="text-h3">ข้อมูลบัญชีรับเงิน</h2>
                        <p class="text-[9px] font-black text-gray-600 uppercase tracking-widest Thai-font">จัดการเลขบัญชี/วอลเล็ต</p>
                    </div>
                </div>
                
                <form id="payment-settings-form" class="space-y-4">
                    <div class="space-y-1">
                        <label class="text-label ml-1">เลขบัญชี/วอลเล็ต</label>
                        <input type="text" id="wallet-number" class="w-full bg-black/40 border border-white/10 rounded-lg py-3 px-4 text-white text-xs outline-none focus:border-brand-primary transition-all" placeholder="097xxxxxxx">
                    </div>
                    <div class="space-y-1">
                        <label class="text-label ml-1">ชื่อบัญชี</label>
                        <input type="text" id="account-name" class="w-full bg-black/40 border border-white/10 rounded-lg py-3 px-4 text-white text-xs outline-none focus:border-brand-primary transition-all" placeholder="ชื่อบัญชีรับเงิน">
                    </div>
                    <button type="submit" class="btn-primary w-full !mt-6">บันทึกข้อมูลบัญชี</button>
                </form>
            </div>
        </div>
    </main>

    <script type="module" src="/src/admin/admin-system.js"></script>
</body>
</html>
