<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8"><title>ประวัติ VIP รายบุคคล | DUYดูDEE</title>
    <link rel="stylesheet" href="/css/output.css"><link rel="stylesheet" href="/css/fonts.css">
</head>
<body class="bg-brand-black text-white selection:bg-brand-primary/50">
    <main class="p-10 max-w-5xl mx-auto space-y-10">
        <header class="flex items-center gap-6">
            <button onclick="history.back()" class="w-12 h-12 rounded-2xl bg-white/5 border border-white/10 flex items-center justify-center hover:bg-brand-primary hover:text-black transition-all">
                <i data-lucide="chevron-left"></i>
            </button>
            <div>
                <h1 class="text-3xl font-black Thai-font uppercase italic">User <span class="text-brand-primary">VIP History</span></h1>
                <p id="target-user-email" class="text-gray-500 text-xs tracking-widest uppercase">Loading...</p>
            </div>
        </header>

        <!-- 💎 Member Status Summary -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="glass-premium p-6 border border-white/5">
                <span class="text-[9px] font-black text-gray-600 uppercase tracking-widest">ยอดรวมการชำระเงิน</span>
                <h2 id="total-paid" class="text-2xl font-black text-brand-primary">0.00 THB</h2>
            </div>
            <!-- รายละเอียดอื่นๆ เช่น สถานะ VIP ปัจจุบัน, วันหมดอายุ -->
        </div>

        <!-- 📜 Transaction Table -->
        <div class="glass-premium overflow-hidden border border-white/5">
            <table class="w-full text-left">
                <thead class="bg-white/5 text-[9px] font-black uppercase tracking-widest text-gray-500">
                    <tr>
                        <th class="p-5">วันที่</th>
                        <th class="p-5">จำนวนเงิน</th>
                        <th class="p-5">สถานะ</th>
                        <th class="p-5">หลักฐาน</th>
                        <th class="p-5 text-right">ดำเนินการ</th>
                    </tr>
                </thead>
                <tbody id="payment-history-body" class="divide-y divide-white/5">
                    <!-- ข้อมูลจะถูกฉีดที่นี่ -->
                </tbody>
            </table>
        </div>
    </main>
    <script type="module" src="/src/admin/admin-user-vip.js"></script>
</body>
</html>
