<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>จัดการซีรีส์ | DUYดูDEE EXECUTIVE</title>
    <link rel="stylesheet" href="/css/output.css">
    <link rel="stylesheet" href="/css/fonts.css">
    <link rel="icon" type="image/png" href="/assets/logo/DUYDODEE.png">

    <!-- 🎨 Lucide Icons -->
    <script src="https://unpkg.com/lucide@0.410.0"></script>
    <meta name="theme-color" content="#050507">
</head>

<body class="bg-[#050507] text-gray-400 antialiased font-body overflow-x-hidden">

    <!-- Mobile Overlay for Sidebar -->
    <div id="admin-overlay" class="fixed inset-0 bg-black/50 z-[400] hidden lg:hidden"></div>

    <!-- 🧭 SIDEBAR -->
    <aside
        class="fixed left-0 top-0 bottom-0 w-80 bg-[#08080a]/80 backdrop-blur-3xl border-r border-white/5 z-[450] transition-transform duration-500 -translate-x-full lg:translate-x-0 flex flex-col"
        id="sidebar">
        <div class="p-10 border-b border-white/5">
            <div class="flex items-center gap-4 group cursor-pointer" onclick="location.href='/'">
                <div class="relative">
                    <img src="/assets/logo/DUYDODEE.png" class="w-12 h-12 rounded-xl z-10 relative"
                        alt="DUYดูDEE-HD Logo">
                    <div
                        class="absolute -inset-2 bg-brand-primary/20 blur-xl rounded-full animate-pulse opacity-0 group-hover:opacity-100 transition-opacity">
                    </div>
                </div>
                <div>
                    <h3 class="text-xl font-black text-white uppercase tracking-tighter leading-none">DUY<span
                            class="text-brand-primary">ดูDEE</span></h3>
                    <p class="text-[8px] font-black text-gray-600 uppercase tracking-[0.4em] mt-1 Thai-font">ADMIN
                        CONTROL</p>
                </div>
            </div>
        </div>

        <nav class="flex-1 px-6 py-10 space-y-2">
            <p class="px-4 text-[9px] font-black text-gray-700 uppercase tracking-[0.3em] mb-4 Thai-font">เมนูจัดการระบบ
            </p>
            <a href="/admin/admin-manage.html"
                class="flex items-center gap-4 px-5 py-4 rounded-2xl transition-all group">
                <i data-lucide="layout-grid" class="w-5 h-5"></i>
                <span class="text-xs font-black uppercase tracking-widest Thai-font">แดชบอร์ดสรุปผล</span>
            </a>
            <a href="/admin/admin-manage-movies.html"
                class="flex items-center gap-4 px-5 py-4 rounded-2xl transition-all group">
                <i data-lucide="film" class="w-5 h-5"></i>
                <span class="text-xs font-bold uppercase tracking-widest Thai-font">จัดการหนัง / เรื่องเดียวจบ</span>
            </a>
            <a href="/admin/admin-manage-series.html"
                class="flex items-center gap-4 px-5 py-4 rounded-2xl transition-all group nav-link-active">
                <i data-lucide="tv" class="w-5 h-5"></i>
                <span class="text-xs font-black uppercase tracking-widest Thai-font">จัดการซีรีส์ / แบบตอน</span>
            </a>
            <a href="/admin/admin-hero-slider.html"
                class="flex items-center gap-4 px-5 py-4 rounded-2xl transition-all group">
                <i data-lucide="images" class="w-5 h-5 text-brand-primary"></i>
                <span
                    class="text-xs font-black uppercase tracking-widest Thai-font text-brand-primary">จัดการสไลด์หน้าแรก</span>
            </a>

            <p class="px-4 text-[9px] font-black text-gray-700 uppercase tracking-[0.3em] mt-10 mb-4 Thai-font">
                สมาชิกและตั้งค่า</p>
            <a href="/admin/admin-users.html"
                class="flex items-center gap-4 px-5 py-4 rounded-2xl transition-all group">
                <i data-lucide="users" class="w-5 h-5"></i>
                <span class="text-xs font-bold uppercase tracking-widest Thai-font">รายชื่อสมาชิกทั้งหมด</span>
            </a>
            <a href="/admin/admin-system.html"
                class="flex items-center gap-4 px-5 py-4 rounded-2xl transition-all group">
                <i data-lucide="shield-check" class="w-5 h-5"></i>
                <span class="text-xs font-bold uppercase tracking-widest Thai-font">ตั้งค่าความปลอดภัย</span>
            </a>
        </nav>

        <div class="p-8 mt-auto border-t border-white/5 bg-black/20">
            <div id="admin-sidebar-profile" class="mb-6"></div>
            <button onclick="location.href='/'"
                class="w-full py-4 rounded-2xl bg-white/5 border border-white/10 text-[9px] font-black text-gray-500 uppercase tracking-widest hover:bg-brand-primary hover:text-black transition-all flex items-center justify-center gap-2 Thai-font">
                <i data-lucide="external-link" class="w-3 h-3"></i> กลับไปหน้าเว็บหลัก
            </button>
        </div>
    </aside>

    <main class="lg:ml-80 min-h-screen p-8 md:p-16 relative z-10">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-8 mb-12">
            <div>
                <h1 class="text-5xl font-black text-white uppercase tracking-tighter italic Thai-font">จัดการ <span
                        class="text-brand-primary">ซีรีส์</span></h1>
                <p class="text-[10px] font-black text-gray-600 uppercase tracking-[0.6em] mt-2 Thai-font">
                    ควบคุมและบริหารจัดการทรัพยากรซีรีส์</p>
            </div>
            <button onclick="location.href='/admin/admin-add-series.html'"
                class="px-8 py-4 bg-brand-primary text-black text-xs font-black uppercase tracking-widest rounded-2xl shadow-lg hover:scale-105 transition-transform Thai-font">
                <i data-lucide="plus" class="w-4 h-4 inline-block mr-2"></i> เพิ่มซีรีส์ใหม่
            </button>
        </header>

        <!-- Search Node -->
        <div class="mb-10 group">
            <div class="relative max-w-2xl">
                <i data-lucide="search"
                    class="absolute left-6 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-600 group-focus-within:text-brand-primary transition-colors"></i>
                <input type="text" id="series-search" placeholder="ค้นหาด้วยชื่อซีรีส์ หมวดหมู่ หรือไอดี..."
                    class="w-full bg-white/5 border border-white/10 rounded-[2rem] py-5 pl-16 pr-8 text-white placeholder-gray-700 outline-none focus:border-brand-primary/50 transition-all shadow-2xl Thai-font text-sm">
            </div>
        </div>

        <section class="admin-table-container cyber-card overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr
                        class="bg-white/[0.02] border-b border-white/5 text-[10px] font-black text-gray-500 uppercase tracking-widest Thai-font">
                        <th class="p-6 text-center">รูปปก</th>
                        <th class="p-6">ข้อมูลซีรีส์</th>
                        <th class="p-6 text-center">จำนวนตอน</th>
                        <th class="p-6 text-center">ยอดเข้าชม</th>
                        <th class="p-6 text-right">ดำเนินการ</th>
                    </tr>
                </thead>
                <tbody id="series-full-list" class="divide-y divide-white/[0.03]">
                </tbody>
            </table>
        </section>

        <div id="pagination-container" class="flex justify-center py-10 gap-2"></div>
    </main>

    <script type="module" src="/src/admin/admin-manage-series.js"></script>
</body>

</html>
