<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สถิติระบบ | DUYดูDEE ADMIN</title>
    <link rel="stylesheet" href="/css/output.css">
    <link rel="stylesheet" href="/css/fonts.css">
    <script src="https://unpkg.com/lucide@0.410.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-brand-black text-white selection:bg-brand-primary/50">
    
    <!-- 📱 Sidebar (ใช้ UI.initAdminSidebar) -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-64 bg-brand-obsidian border-r border-white/5 transform -translate-x-full lg:translate-x-0 transition-transform duration-300"></aside>

    <main class="flex-1 lg:ml-64 p-6 md:p-10 space-y-10">
        <header class="flex justify-between items-end">
            <div>
                <h1 class="text-3xl font-black uppercase italic tracking-tighter Thai-font">System <span class="text-brand-primary">Statistics</span></h1>
                <p class="text-gray-500 text-xs Thai-font uppercase tracking-widest">วิเคราะห์ยอดการรับชมและข้อมูลเนื้อหา</p>
            </div>
            
            <!-- 📅 Date Range Filter -->
            <div class="flex items-center gap-3 bg-black/40 backdrop-blur-md border border-brand-primary/20 rounded-2xl p-2 backdrop-blur-md animate-fade-in">
                <div class="flex items-center gap-2 px-3 py-1.5 bg-black/40 rounded-xl border border-white/5">
                    <span class="text-[9px] font-black text-gray-600 uppercase">From</span>
                    <input type="date" id="date-start" class="bg-transparent text-[11px] text-white outline-none Thai-font">
                    <span class="text-[9px] font-black text-gray-600 uppercase ml-2">To</span>
                    <input type="date" id="date-end" class="bg-transparent text-[11px] text-white outline-none Thai-font">
                </div>
                <button id="filter-date-btn" class="px-4 py-2 bg-brand-primary text-black text-[10px] font-black uppercase rounded-xl hover:scale-105 transition-all">Filter</button>
            </div>
        </header>

        <!-- 🏁 Summary Dashboard -->
        <div class="grid grid-cols-2 lg:grid-cols-5 gap-4 md:gap-6 animate-slide-up">
            <div class="bg-black/40 backdrop-blur-md border border-brand-primary/20 p-6 border border-white/5 flex flex-col gap-1 relative overflow-hidden group">
                <span class="text-[10px] font-black text-gray-500 uppercase tracking-widest relative z-10">สมาชิกทั้งหมด</span>
                <h2 id="total-users" class="text-3xl font-black text-brand-primary Thai-font italic relative z-10">0</h2>
                <i data-lucide="users" class="absolute -bottom-2 -right-2 w-16 h-16 text-white/5 group-hover:text-brand-primary/10 transition-colors"></i>
            </div>
            <div class="bg-black/40 backdrop-blur-md border border-brand-primary/20 p-6 border border-white/5 flex flex-col gap-1 relative overflow-hidden group">
                <span class="text-[10px] font-black text-gray-500 uppercase tracking-widest relative z-10">ยอดวิวรวม</span>
                <h2 id="total-views" class="text-3xl font-black text-brand-primary Thai-font italic relative z-10">0</h2>
                <i data-lucide="eye" class="absolute -bottom-2 -right-2 w-16 h-16 text-white/5 group-hover:text-brand-primary/10 transition-colors"></i>
            </div>
            <div class="bg-black/40 backdrop-blur-md border border-brand-primary/20 p-6 border border-white/5 flex flex-col gap-1 relative overflow-hidden group">
                <span class="text-[10px] font-black text-gray-500 uppercase tracking-widest relative z-10">ภาพยนตร์</span>
                <h2 id="total-movies" class="text-3xl font-black text-white Thai-font italic relative z-10">0</h2>
                <i data-lucide="film" class="absolute -bottom-2 -right-2 w-16 h-16 text-white/5 group-hover:text-brand-primary/10 transition-colors"></i>
            </div>
            <div class="bg-black/40 backdrop-blur-md border border-brand-primary/20 p-6 border border-white/5 flex flex-col gap-1 relative overflow-hidden group">
                <span class="text-[10px] font-black text-gray-500 uppercase tracking-widest relative z-10">ซีรีส์</span>
                <h2 id="total-series" class="text-3xl font-black text-white Thai-font italic relative z-10">0</h2>
                <i data-lucide="tv" class="absolute -bottom-2 -right-2 w-16 h-16 text-white/5 group-hover:text-brand-primary/10 transition-colors"></i>
            </div>
        </div>

        <!-- 📊 Statistics Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <!-- Chart: Views by Category -->
            <div class="bg-black/40 backdrop-blur-md border border-brand-primary/20 p-6 border border-white/5">
                <h3 class="text-sm font-black mb-6 uppercase tracking-widest text-brand-primary">ยอดเข้าชมแยกตามหมวดหมู่</h3>
                <canvas id="categoryChart"></canvas>
            </div>

            <!-- Chart: Content by Year -->
            <div class="bg-black/40 backdrop-blur-md border border-brand-primary/20 p-6 border border-white/5">
                <h3 class="text-sm font-black mb-6 uppercase tracking-widest text-brand-primary">จำนวนเนื้อหาแยกตามปีที่ฉาย</h3>
                <canvas id="yearChart"></canvas>
            </div>

            <!-- Chart: Views Comparison (Movie vs Series) -->
            <div class="bg-black/40 backdrop-blur-md border border-brand-primary/20 p-6 border border-white/5 md:col-span-2">
                <h3 class="text-sm font-black mb-6 uppercase tracking-widest text-brand-primary">สัดส่วนยอดเข้าชม: ภาพยนตร์ VS ซีรีส์</h3>
                <div class="h-[250px] flex items-center justify-center">
                    <canvas id="viewTypeChart"></canvas>
                </div>
            </div>

            <!-- 💰 Chart: Monthly VIP Revenue -->
            <div class="bg-black/40 backdrop-blur-md border border-brand-primary/20 p-6 border border-white/5 md:col-span-2">
                <div class="flex items-center justify-between mb-6">
                    <h3 class="text-sm font-black uppercase tracking-widest text-brand-primary">สรุปรายได้ VIP แยกตามรายเดือน (THB)</h3>
                    <div id="growth-rate-badge" class="px-3 py-1 rounded-full bg-black/40 backdrop-blur-md border border-brand-primary/20 hidden animate-fade-in">
                        <span class="text-[9px] font-black text-gray-500 uppercase tracking-widest mr-1">Growth:</span>
                        <span id="growth-value" class="text-[10px] font-black Thai-font">0%</span>
                    </div>
                </div>
                <canvas id="revenueChart"></canvas>
            </div>
        </div>

        <!-- 📈 Daily Traffic -->
        <div class="bg-black/40 backdrop-blur-md border border-brand-primary/20 p-6 border border-white/5">
            <div class="flex items-center justify-between mb-6">
                <h3 class="text-sm font-black uppercase tracking-widest text-brand-primary">สถิติการเข้าชมรายวัน (Daily Views)</h3>
                <div class="flex gap-2">
                    <button id="export-csv-btn" class="px-3 py-1.5 bg-black/40 backdrop-blur-md border border-brand-primary/20 rounded-lg text-[9px] font-black uppercase tracking-widest hover:bg-white/10 transition-all flex items-center gap-2">
                        <i data-lucide="download" class="w-3 h-3"></i> Export CSV
                    </button>
                </div>
            </div>
            <div class="h-[300px]">
                <canvas id="dailyChart"></canvas>
            </div>
        </div>
    </main>

    <script type="module" src="/src/admin/admin-stats.js"></script>
</body>
</html>
