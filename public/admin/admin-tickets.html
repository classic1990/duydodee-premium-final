<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8"><title>จัดการการแจ้งปัญหา | DUYดูDEE ADMIN</title>
    <link rel="stylesheet" href="/css/output.css"><link rel="stylesheet" href="/css/fonts.css">
    <script src="https://unpkg.com/lucide@0.410.0"></script>
</head>
<body class="bg-brand-black text-white min-h-screen flex">
    <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-64 bg-brand-obsidian border-r border-white/5 transform -translate-x-full lg:translate-x-0 transition-transform duration-300"></aside>
    
    <main class="flex-1 lg:ml-64 p-6 md:p-10 space-y-8">
        <header class="flex justify-between items-end">
            <div>
                <h1 class="text-3xl font-black uppercase italic tracking-tighter Thai-font">Support <span class="text-brand-primary">Tickets</span></h1>
                <p class="text-gray-500 text-xs Thai-font uppercase tracking-widest">ตอบกลับและจัดการปัญหาจากสมาชิก</p>
            </div>
            <div class="flex gap-2">
                <select id="status-filter" class="bg-white/5 border border-white/10 rounded-xl px-4 py-2 text-[10px] font-black uppercase text-white outline-none">
                    <option value="all">ทั้งหมด</option>
                    <option value="open">รอรับเรื่อง</option>
                    <option value="in-progress">กำลังดำเนินการ</option>
                    <option value="resolved">แก้ไขแล้ว</option>
                </select>
            </div>
        </header>

        <div id="tickets-container" class="grid grid-cols-1 gap-4">
            <!-- Tickets will be injected here -->
        </div>
    </main>

    <script type="module" src="/src/admin/admin-tickets.js"></script>
</body>
</html>
