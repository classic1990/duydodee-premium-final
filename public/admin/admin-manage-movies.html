<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1024, initial-scale=0.5, maximum-scale=1.0">
    <title>จัดการภาพยนตร์ | DUYดูDEE EXECUTIVE</title>
    <link rel="stylesheet" href="/css/output.css">
    <link rel="stylesheet" href="/css/fonts.css">
    <link rel="icon" type="image/png" href="/assets/logo/DUYDODEE.png">
    
    <!-- 🎨 Lucide Icons -->
    <script src="https://unpkg.com/lucide@0.410.0"></script>
    <meta name="theme-color" content="#050507">
</head>
<body class="bg-brand-black text-white selection:bg-brand-primary/50">

    <!-- 🧭 SIDEBAR -->
    <aside class="fixed left-0 top-0 bottom-0 w-80 bg-[#08080a]/80 backdrop-blur-3xl border-r border-white/5 z-[450] transition-transform duration-500 -translate-x-full lg:translate-x-0 flex flex-col" id="sidebar"></aside>

    <main class="lg:ml-80 min-h-screen p-6 relative z-10">
        
        <!-- Mobile Sidebar Toggle -->
        <button id="sidebar-toggle-btn" class="lg:hidden fixed top-5 left-5 z-[500] p-3 rounded-full bg-[#08080a]/80 backdrop-blur-xl border border-white/10 text-white hover:text-brand-primary transition-all">
            <i data-lucide="menu" class="w-5 h-5"></i>
        </button>

        <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-8 mb-8">
            <div>
                <h1 class="text-h1 heading-highlight">จัดการ <span class="text-brand-primary">ภาพยนตร์</span></h1>
                <p class="text-[9px] font-black text-gray-600 uppercase tracking-[0.4em] mt-1 Thai-font">ควบคุมและบริหารจัดการทรัพยากรภาพยนตร์</p>
            </div>
            <a href="/admin/admin-add-movie.html" class="btn-primary">
                <i data-lucide="plus" class="w-4 h-4"></i> เพิ่มภาพยนตร์ใหม่
            </a>
        </header>

        <!-- Search Node -->
        <div class="mb-8">
            <div class="relative max-w-2xl">
                <i data-lucide="search" class="absolute left-6 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-600"></i>
                <input type="text" id="movie-search" placeholder="ค้นหาด้วยชื่อเรื่อง หมวดหมู่ หรือไอดี..." class="w-full bg-black/40 border border-white/10 rounded-xl py-4 pl-14 pr-8 text-white placeholder-gray-700 outline-none focus:border-brand-primary/50 transition-all text-xs Thai-font">
            </div>
        </div>

        <section class="glass-premium rounded-2xl overflow-hidden border border-white/5">
            <table class="w-full text-left border-collapse min-w-[600px]">
                <thead>
                    <tr class="bg-white/[0.02] border-b border-white/5 text-[9px] font-black text-gray-500 uppercase tracking-widest Thai-font">
                        <th class="p-4 text-center">รูปปก</th>
                        <th class="p-4">ข้อมูลภาพยนตร์</th>
                        <th class="p-4 text-center">หมวดหมู่</th>
                        <th class="p-4 text-center">ยอดเข้าชม</th>
                        <th class="p-4 text-right">ดำเนินการ</th>
                    </tr>
                </thead>
                <tbody id="movies-full-list" class="divide-y divide-white/[0.03]">
                </tbody>
            </table>
        </section>
        
        <div id="pagination-container" class="flex justify-center py-10 gap-2"></div>
    </main>

    <div id="admin-overlay" class="fixed inset-0 bg-black/50 z-[400] hidden lg:hidden"></div>

    <script type="module" src="/src/admin/admin-manage-movies.js"></script>
</body>
</html>
