<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จัดการสมาชิก | DUYดูDEE ADMIN</title>
    <link rel="stylesheet" href="/css/output.css">
    <link rel="stylesheet" href="/css/fonts.css">
    <script src="https://unpkg.com/lucide@0.410.0"></script>
</head>
<body class="bg-brand-black text-white selection:bg-brand-primary/50">
    <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-64 bg-brand-obsidian border-r border-white/5 transform -translate-x-full lg:translate-x-0 transition-transform duration-300"></aside>
    
    <main class="flex-1 lg:ml-64 p-6 md:p-10 space-y-8">
        <header class="flex justify-between items-end">
            <div>
                <h1 class="text-3xl font-black uppercase italic tracking-tighter Thai-font">User <span class="text-brand-primary">Management</span></h1>
                <p class="text-gray-500 text-xs Thai-font uppercase tracking-widest">จัดการสิทธิ์และตรวจสอบสมาชิกในระบบ</p>
            </div>
            <div class="flex items-center gap-3">
                <span id="user-count" class="px-4 py-2 bg-white/5 rounded-xl border border-white/10 text-[10px] font-black Thai-font">สมาชิกทั้งหมด: 0</span>
            </div>
        </header>

        <!-- 🔍 Search & Filter -->
        <div class="flex flex-col md:flex-row gap-4">
            <div class="relative flex-1">
                <i data-lucide="search" class="absolute left-5 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-600"></i>
                <input type="text" id="user-search" 
                       placeholder="ค้นหาชื่อหรืออีเมลสมาชิก..." 
                       class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 pl-14 pr-6 text-white text-xs outline-none focus:border-brand-primary/50 transition-all Thai-font">
            </div>
            <select id="role-filter" class="bg-white/5 border border-white/10 rounded-2xl px-6 py-4 text-white text-xs outline-none focus:border-brand-primary/50 transition-all Thai-font w-full md:w-48">
                <option value="all">ทุกระดับสมาชิก</option>
                <option value="super-admin">ผู้บริหาร</option>
                <option value="admin">แอดมิน</option>
                <option value="vip">VIP (พรีเมียม)</option>
                <option value="member">สมาชิกทั่วไป</option>
            </select>
        </div>

        <div class="glass-premium overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-white/5 border-b border-white/5">
                        <tr>
                            <th class="p-5 text-[10px] font-black uppercase tracking-widest text-gray-500">Member</th>
                            <th class="p-5 text-center text-[10px] font-black uppercase tracking-widest text-gray-500">Role</th>
                            <th class="p-5 text-center text-[10px] font-black uppercase tracking-widest text-gray-500">Status</th>
                            <th class="p-5 text-center text-[10px] font-black uppercase tracking-widest text-gray-500">Joined Date</th>
                            <th class="p-5 text-[10px] font-black uppercase tracking-widest text-gray-500 text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="user-list" class="divide-y divide-white/5">
                        <!-- User rows will be injected here -->
                    </tbody>
                </table>
            </div>
        </div>

        <div id="pagination-container" class="flex justify-center py-4"></div>

        <!-- 📝 Edit User Modal -->
        <div id="edit-user-modal" class="fixed inset-0 z-[1000] hidden items-center justify-center bg-black/90 backdrop-blur-xl p-4">
            <div class="glass-premium border border-white/10 rounded-[2.5rem] p-10 max-w-lg w-full relative animate-zoom-in">
                <button onclick="this.closest('#edit-user-modal').classList.add('hidden')" class="absolute top-8 right-8 text-gray-500 hover:text-white">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
                <div class="text-center mb-8">
                    <h2 class="text-2xl font-black text-white Thai-font uppercase italic">Edit <span class="text-brand-primary">User Privileges</span></h2>
                    <p class="text-[10px] text-gray-500 uppercase tracking-widest mt-2">แก้ไขระดับสมาชิกและข้อมูลเบื้องต้น</p>
                </div>
                <form id="edit-user-form" class="space-y-6">
                    <input type="hidden" id="edit-uid">
                    <div class="space-y-2">
                        <label class="text-[9px] font-black text-gray-600 uppercase tracking-widest ml-1">Display Name</label>
                        <input type="text" id="edit-displayName" class="w-full bg-black/50 border border-white/10 rounded-xl p-4 text-xs text-white focus:border-brand-primary outline-none transition-all Thai-font">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[9px] font-black text-gray-600 uppercase tracking-widest ml-1">User Role</label>
                        <select id="edit-role" class="w-full bg-black/50 border border-white/10 rounded-xl p-4 text-xs text-white focus:border-brand-primary outline-none transition-all Thai-font">
                            <option value="member">Member (สมาชิกทั่วไป)</option>
                            <option value="vip">VIP (พรีเมียม)</option>
                            <option value="admin">Admin (ผู้ดูแลระบบ)</option>
                            <option value="super-admin">Super Admin (ผู้บริหาร)</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-primary w-full !py-5 shadow-lg shadow-brand-primary/20">Update Member Information</button>
                </form>
            </div>
        </div>
    </main>

    <div id="admin-overlay" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[40] hidden"></div>
    <button id="sidebar-toggle-btn" class="lg:hidden fixed bottom-6 right-6 w-14 h-14 rounded-2xl bg-brand-primary text-black shadow-2xl z-[60] flex items-center justify-center">
        <i data-lucide="menu"></i>
    </button>

    <script type="module" src="/src/admin/admin-users.js"></script>
</body>
</html>
