<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ประวัติการทำงานแอดมิน | DUYดูDEE ADMIN</title>
    <link rel="stylesheet" href="/css/output.css">
    <link rel="stylesheet" href="/css/fonts.css">
    <script src="https://unpkg.com/lucide@0.410.0"></script>
</head>
<body class="bg-brand-black text-white min-h-screen flex">
    <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-64 bg-brand-obsidian border-r border-white/5 transform -translate-x-full lg:translate-x-0 transition-transform duration-300"></aside>
    
    <main class="flex-1 lg:ml-64 p-6 md:p-10 space-y-8">
        <header class="flex justify-between items-end">
            <div>
                <h1 class="text-3xl font-black uppercase italic tracking-tighter Thai-font">Activity <span class="text-brand-primary">Logs</span></h1>
                <p class="text-gray-500 text-xs Thai-font uppercase tracking-widest">ตรวจสอบประวัติการทำงานของทีมผู้ดูแลระบบ</p>
            </div>
        </header>

        <!-- 🔍 Filter & Export Controls -->
        <div class="flex flex-col gap-6 animate-fade-in">
            <div class="flex flex-col md:flex-row gap-4">
                <div class="relative flex-1">
                    <i data-lucide="search" class="absolute left-5 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-600"></i>
                    <input type="text" id="log-search-input" 
                           placeholder="ค้นหาประเภทการทำงาน (เช่น RESET)..." 
                           class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 pl-14 pr-6 text-white text-xs outline-none focus:border-brand-primary/50 transition-all Thai-font">
                </div>
                <input type="email" id="admin-filter-input" placeholder="กรองด้วยอีเมลแอดมิน..." 
                       class="bg-white/5 border border-white/10 rounded-2xl px-6 py-4 text-white text-xs outline-none focus:border-brand-primary/50 transition-all Thai-font w-full md:w-64">
            </div>
            
            <div class="flex flex-col md:flex-row items-center justify-between gap-4 bg-white/5 border border-white/10 rounded-3xl p-4">
                <div class="flex flex-wrap items-center gap-3">
                    <div class="flex gap-2 mr-2">
                        <button id="quick-today-btn" class="px-3 py-1.5 bg-white/5 border border-white/10 rounded-lg text-[9px] font-black text-gray-500 uppercase hover:text-brand-primary transition-all">วันนี้</button>
                        <button id="quick-month-btn" class="px-3 py-1.5 bg-white/5 border border-white/10 rounded-lg text-[9px] font-black text-gray-500 uppercase hover:text-brand-primary transition-all">เดือนนี้</button>
                    </div>
                    <div class="flex items-center gap-2 px-4 py-2 bg-black/40 rounded-xl border border-white/5">
                        <span class="text-[9px] font-black text-gray-600 uppercase">From</span>
                        <input type="date" id="date-start" class="bg-transparent text-[11px] text-white outline-none Thai-font">
                        <span class="text-[9px] font-black text-gray-600 uppercase ml-2">To</span>
                        <input type="date" id="date-end" class="bg-transparent text-[11px] text-white outline-none Thai-font">
                    </div>
                    <button id="apply-filters-btn" class="px-6 py-2 bg-brand-primary text-black text-[10px] font-black uppercase rounded-xl hover:scale-105 transition-all">Apply Filter</button>
                </div>
                <button id="export-logs-btn" class="flex items-center gap-2 px-8 py-3 bg-brand-primary/10 border border-brand-primary/20 rounded-2xl text-[10px] font-black uppercase tracking-widest text-brand-primary hover:bg-brand-primary hover:text-black transition-all">
                    <i data-lucide="download" class="w-4 h-4"></i> Export CSV
                </button>
            </div>
        </div>

        <div class="glass-premium overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-white/5 border-b border-white/5">
                        <tr>
                            <th class="p-5 text-[10px] font-black uppercase tracking-widest text-gray-500">Timestamp</th>
                            <th class="p-5 text-[10px] font-black uppercase tracking-widest text-gray-500">Admin</th>
                            <th class="p-5 text-[10px] font-black uppercase tracking-widest text-gray-500">Action</th>
                            <th class="p-5 text-[10px] font-black uppercase tracking-widest text-gray-500">Details</th>
                        </tr>
                    </thead>
                    <tbody id="log-table-body" class="divide-y divide-white/5">
                        <!-- Logs will be injected here -->
                    </tbody>
                </table>
            </div>
        </div>
        <div id="pagination-container" class="flex justify-center py-4">
             <button id="load-more-logs" class="btn-secondary !py-2 !px-6 text-[10px] Thai-font">โหลดเพิ่มเติม</button>
        </div>
    </main>

    <div id="admin-overlay" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[40] hidden"></div>
    <button id="sidebar-toggle-btn" class="lg:hidden fixed bottom-6 right-6 w-14 h-14 rounded-2xl bg-brand-primary text-black shadow-2xl z-[60] flex items-center justify-center">
        <i data-lucide="menu"></i>
    </button>

    <script type="module" src="/src/admin/admin-activity-logs.js"></script>
</body>
</html>
