<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เพิ่มซีรีส์ใหม่ | DUYดูDEE EXECUTIVE</title>
    <link rel="stylesheet" href="/css/output.css">
    <link rel="stylesheet" href="/css/fonts.css">
    <link rel="icon" type="image/png" href="assets/logo/DUYDODEE.png">
    
    <!-- 🎨 Lucide Icons -->
    <script src="https://unpkg.com/lucide@0.410.0"></script>
    <meta name="theme-color" content="#050507">
</head>
<body class="bg-brand-black text-white selection:bg-brand-primary/50">

    <!-- Mobile Overlay for Sidebar -->
    <div id="admin-overlay" class="fixed inset-0 bg-black/50 z-[400] hidden lg:hidden"></div>

    <!-- 🧭 SIDEBAR -->
    <aside id="sidebar" class="fixed left-0 top-0 bottom-0 w-80 bg-[#08080a]/80 backdrop-blur-3xl border-r border-white/5 z-[450] transition-transform duration-500 -translate-x-full lg:translate-x-0 flex flex-col"></aside>

    <main class="lg:ml-80 min-h-screen p-8 md:p-16 relative z-10">
        <!-- Mobile Sidebar Toggle -->
        <button id="sidebar-toggle-btn" class="lg:hidden fixed top-5 left-5 z-[500] p-3 rounded-full bg-[#08080a]/80 backdrop-blur-xl border border-white/10 text-white hover:text-brand-primary transition-all" aria-label="เปิดเมนู">
            <i data-lucide="menu" class="w-5 h-5"></i>
        </button>
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-8 mb-12">
            <div>
                <h1 class="text-5xl font-black text-white uppercase tracking-tighter italic Thai-font">เพิ่ม <span class="text-brand-primary">ซีรีส์</span></h1>
                <p class="text-[10px] font-black text-gray-600 uppercase tracking-[0.6em] mt-2 Thai-font">ลงทะเบียนซีรีส์แบบตอนเข้าสู่ฐานข้อมูลระบบ</p>
            </div>
        </header>

        <form id="add-series-form" class="grid grid-cols-1 xl:grid-cols-12 gap-12">
            <!-- Preview Column -->
            <div class="xl:col-span-4">
                <div class="cyber-card p-8 sticky top-8">
                    <h3 class="text-center text-[10px] font-black text-gray-600 uppercase tracking-[0.3em] mb-10 Thai-font">ตัวอย่างหน้าปก</h3>
                    
                    <div class="device-frame mx-auto scale-90">
                        <div class="device-screen relative overflow-hidden bg-black">
                            <img id="poster-preview" src="" class="w-full h-full object-cover opacity-0 transition-opacity duration-700" loading="lazy" alt="ตัวอย่างหน้าปกซีรีส์">
                            <div id="no-preview" class="absolute inset-0 flex flex-col items-center justify-center text-gray-800 space-y-4">
                                <i data-lucide="image" class="w-12 h-12"></i>
                                <span class="text-[8px] font-black uppercase Thai-font">รอลิงก์รูปภาพ...</span>
                            </div>
                        </div>
                    </div>

                    <div class="mt-10 space-y-6">
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-gray-500 uppercase tracking-widest ml-2">ลิงก์รูปภาพหน้าปก</label>
                            <input type="url" id="poster" class="w-full bg-black/40 border border-white/10 rounded-2xl py-4 px-6 text-white outline-none focus:border-brand-primary transition-all text-xs" placeholder="https://..." required>
                        </div>
                    </div>
                </div>
            </div>

            <div class="xl:col-span-8">
                <div class="cyber-card p-10 space-y-10">
                    <!-- Section: Basic Info -->
                    <div class="space-y-6">
                        <div class="flex items-center gap-4">
                            <div class="w-1.5 h-6 bg-brand-primary rounded-full"></div>
                            <h2 class="text-lg font-black text-white uppercase tracking-widest Thai-font">ข้อมูลพื้นฐานซีรีส์</h2>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="space-y-2">
                                <label class="text-[10px] font-black text-gray-500 uppercase tracking-widest ml-2 Thai-font">ชื่อซีรีส์</label>
                                <input type="text" id="title" class="w-full bg-black/40 border border-white/10 rounded-2xl py-4 px-6 text-white outline-none focus:border-brand-primary transition-all Thai-font" placeholder="ระบุชื่อซีรีส์ภาษาไทย..." required>
                            </div>
                            <div class="space-y-2">
                                <label class="text-[10px] font-black text-gray-500 uppercase tracking-widest ml-2 Thai-font">หมวดหมู่</label>
                                <select id="category" class="w-full bg-black/40 border border-white/10 rounded-2xl py-4 px-6 text-white outline-none focus:border-brand-primary transition-all Thai-font appearance-none" aria-label="หมวดหมู่ซีรีส์">
                                    <option value="ซีรีส์แนวตั้ง">ซีรีส์แนวตั้ง (ตอนยาว)</option>
                                    <option value="ซีรีส์แนวตั้ง (ตอนเดียวจบ)">ซีรีส์แนวตั้ง (ตอนเดียวจบ)</option>
                                    <option value="ซีรีส์จีนพากย์ไทย">ซีรีส์จีนพากย์ไทย</option>
                                </select>
                            </div>
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-gray-500 uppercase tracking-widest ml-2 Thai-font">เรื่องย่อ</label>
                            <textarea id="description" class="w-full bg-black/40 border border-white/10 rounded-2xl py-4 px-6 text-white outline-none focus:border-brand-primary transition-all Thai-font min-h-[120px] resize-none" placeholder="ระบุรายละเอียดซีรีส์..."></textarea>
                        </div>
                    </div>

                    <!-- Section: Episodes -->
                    <div class="space-y-8 pt-10 border-t border-white/5">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center gap-4">
                                <div class="w-1.5 h-6 bg-blue-500 rounded-full"></div>
                                <h2 class="text-lg font-black text-white uppercase tracking-widest Thai-font">การจัดการตอน (EPISODES)</h2>
                            </div>
                            <button type="button" id="add-episode-btn" class="px-6 py-2 bg-blue-500/10 border border-blue-500/20 text-blue-400 text-[10px] font-black uppercase tracking-widest rounded-xl hover:bg-blue-500 hover:text-white transition-all Thai-font">
                                + เพิ่มตอนใหม่
                            </button>
                        </div>
                        
                        <div id="episode-container" class="space-y-4"></div>
                    </div>

                    <div class="flex flex-col md:flex-row gap-4 pt-4">
                        <button type="submit" id="submit-btn" class="flex-1 py-5 bg-brand-primary text-black text-xs font-black uppercase tracking-widest rounded-2xl shadow-xl hover:scale-[1.02] transition-transform active:scale-95 Thai-font">
                            บันทึกซีรีส์และตอนทั้งหมด
                        </button>
                        <a href="admin/admin-manage-series.html" class="px-10 py-5 bg-black/40 backdrop-blur-md border border-brand-primary/20 text-gray-400 text-xs font-black uppercase tracking-widest rounded-2xl hover:bg-white/10 transition-all text-center Thai-font">
                            ยกเลิก
                        </a>
                    </div>
                </div>
            </div>
        </form>
    </main>

    <script type="module" src="/src/admin/admin-add-series.js"></script>
</body>
</html>
