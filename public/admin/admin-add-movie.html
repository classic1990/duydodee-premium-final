<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เพิ่มภาพยนตร์ใหม่ | DUYดูDEE EXECUTIVE</title>
    <link rel="stylesheet" href="/css/output.css">
    <link rel="stylesheet" href="/css/fonts.css">
    <link rel="icon" type="image/png" href="assets/logo/DUYDODEE.png">
    
    <!-- 📊 Advanced UI Core -->
    <script src="https://unpkg.com/lucide@0.410.0"></script>
    <meta name="theme-color" content="#050507">
</head>
<body class="bg-brand-black text-white selection:bg-brand-primary/50">

    <!-- Mobile Overlay for Sidebar -->
    <div id="admin-overlay" class="fixed inset-0 bg-black/50 z-[400] hidden lg:hidden"></div>

    <!-- 🧭 SIDEBAR -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-80 bg-brand-obsidian border-r border-white/5 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 flex flex-col"></aside>

    <main class="lg:ml-80 min-h-screen p-6 md:p-16 relative z-10">
        <!-- Mobile Sidebar Toggle -->
        <button id="sidebar-toggle-btn" class="lg:hidden fixed top-5 left-5 z-[500] p-3 rounded-full bg-[#08080a]/80 backdrop-blur-xl border border-white/10 text-white hover:text-brand-primary transition-all">
            <i data-lucide="menu" class="w-5 h-5"></i>
        </button>

        <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-8 mb-12 pl-12 lg:pl-0">
            <div class="flex items-center gap-6">
                <a href="admin/admin-manage-movies.html" class="w-12 h-12 flex items-center justify-center rounded-2xl bg-black/40 backdrop-blur-md border border-brand-primary/20 hover:bg-brand-primary hover:text-black transition-all">
                    <i data-lucide="chevron-left" class="w-6 h-6"></i>
                </a>
                <div>
                    <h1 class="text-4xl font-black text-white uppercase tracking-tighter italic Thai-font">เพิ่ม <span class="text-brand-primary">ภาพยนตร์</span></h1>
                    <p class="text-[10px] font-black text-gray-600 uppercase tracking-[0.4em] mt-1 Thai-font">ลงทะเบียนสื่อใหม่เข้าสู่ฐานข้อมูลระบบ</p>
                </div>
            </div>
        </header>

        <form id="add-movie-form" class="grid grid-cols-1 xl:grid-cols-12 gap-12">
            <!-- Preview Column (Moves to top on mobile) -->
            <div class="xl:col-span-4 order-1 xl:order-2">
                <div class="cyber-card p-6 md:p-8 sticky top-8">
                    <h3 class="text-center text-[10px] font-black text-gray-600 uppercase tracking-[0.3em] mb-8 Thai-font">ตัวอย่างการแสดงผลบนอุปกรณ์</h3>
                    
                    <div class="device-frame mx-auto scale-[0.7] md:scale-90 transition-transform">
                        <div class="device-screen relative overflow-hidden bg-black">
                            <img id="poster-preview" src="" class="w-full h-full object-cover opacity-0 transition-opacity duration-700">
                            <div id="no-preview" class="absolute inset-0 flex flex-col items-center justify-center text-gray-800 space-y-4">
                                <i data-lucide="image" class="w-12 h-12"></i>
                                <span class="text-[8px] font-black uppercase Thai-font">รอข้อมูลวิดีโอ...</span>
                            </div>
                        </div>
                    </div>

                    <div class="mt-4 md:mt-10 space-y-6">
                        <div class="p-4 rounded-2xl bg-black/40 border border-white/5">
                            <p id="preview-title" class="text-xs font-black text-gray-500 text-center Thai-font italic">ยังไม่ได้ระบุชื่อเรื่อง</p>
                        </div>
                        <div id="thumbnail-options-container" class="flex gap-3 overflow-x-auto pb-4 scrollbar-hide"></div>
                    </div>
                </div>
            </div>

            <div class="xl:col-span-8 order-2 xl:order-1">
                <div class="cyber-card p-6 md:p-10 space-y-10">
                    <!-- Section: Media Source -->
                    <div class="space-y-6">
                        <div class="flex items-center gap-4">
                            <div class="w-1.5 h-6 bg-brand-primary rounded-full"></div>
                            <h2 class="text-lg font-black text-white uppercase tracking-widest Thai-font">แหล่งที่มาวิดีโอ</h2>
                        </div>
                        <div class="relative group">
                            <i data-lucide="link" class="absolute left-5 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-600 group-focus-within:text-brand-primary transition-colors"></i>
                            <label for="videoUrl" class="sr-only">ลิงก์วิดีโอ</label>
                            <input type="url" id="videoUrl" class="w-full bg-black/40 border border-white/10 rounded-2xl py-4 pl-14 pr-6 text-white outline-none focus:border-brand-primary transition-all Thai-font" placeholder="ระบุลิงก์ YouTube..." required>
                        </div>
                    </div>

                    <!-- Section: Basic Info -->
                    <div class="space-y-6 pt-10 border-t border-white/5">
                        <div class="flex items-center gap-4">
                            <div class="w-1.5 h-6 bg-brand-primary rounded-full"></div>
                            <h2 class="text-lg font-black text-white uppercase tracking-widest Thai-font">ข้อมูลพื้นฐาน</h2>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="space-y-2">
                                <label for="title" class="text-[10px] font-black text-gray-500 uppercase tracking-widest ml-2 Thai-font">ชื่อเรื่อง</label>
                                <input type="text" id="title" class="w-full bg-black/40 border border-white/10 rounded-2xl py-4 px-6 text-white outline-none focus:border-brand-primary transition-all Thai-font" placeholder="ระบุชื่อเรื่องภาษาไทย..." required>
                            </div>
                            <div class="space-y-2">
                                <label for="category" class="text-[10px] font-black text-gray-500 uppercase tracking-widest ml-2 Thai-font">หมวดหมู่</label>
                                <select id="category" class="w-full bg-black/40 border border-white/10 rounded-2xl py-4 px-6 text-white outline-none focus:border-brand-primary transition-all Thai-font appearance-none">
                                    <option value="ซีรีส์แนวตั้ง">ซีรีส์แนวตั้ง</option>
                                    <option value="ซีรีส์จีนพากย์ไทย">ซีรีส์จีนพากย์ไทย</option>
                                </select>
                            </div>
                            <div class="space-y-2">
                                <label for="badge" class="text-[10px] font-black text-gray-500 uppercase tracking-widest ml-2 Thai-font">ป้ายกำกับ (Badge)</label>
                                <input type="text" id="badge" class="w-full bg-black/40 border border-white/10 rounded-2xl py-4 px-6 text-white outline-none focus:border-brand-primary transition-all Thai-font" placeholder="เช่น 4K HDR, พากย์ไทย">
                            </div>
                        </div>
                        <div class="space-y-2">
                            <label for="description" class="text-[10px] font-black text-gray-500 uppercase tracking-widest ml-2 Thai-font">เรื่องย่อ / รายละเอียด</label>
                            <textarea id="description" class="w-full bg-black/40 border border-white/10 rounded-2xl py-4 px-6 text-white outline-none focus:border-brand-primary transition-all Thai-font min-h-[150px] resize-none" placeholder="ระบุรายละเอียดเนื้อหาที่ต้องการแสดง..."></textarea>
                        </div>
                        <input type="hidden" id="selected-poster-url">
                    </div>

                    <div class="flex flex-col md:flex-row gap-4 pt-10 border-t border-white/5">
                        <button type="submit" id="submit-btn" class="flex-1 py-5 bg-brand-primary text-black text-xs font-black uppercase tracking-widest rounded-2xl shadow-xl hover:scale-[1.02] transition-transform active:scale-95 Thai-font">
                            บันทึกและเผยแพร่ข้อมูล
                        </button>
                        <a href="admin/admin-manage-movies.html" class="px-10 py-5 bg-black/40 backdrop-blur-md border border-brand-primary/20 text-gray-400 text-xs font-black uppercase tracking-widest rounded-2xl hover:bg-white/10 transition-all text-center Thai-font">
                            ยกเลิก
                        </a>
                    </div>
                </div>
            </div>
        </form>
    </main>

    <script type="module" src="/src/admin/admin-add-movie.js"></script>
</body>
</html>
