<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>กู้คืนรหัสผ่าน | DUYดูDEE PREMIUM</title>
    <meta name="description" content="ระบุอีเมลของคุณเพื่อรับลิงก์ตั้งรหัสผ่านใหม่ บน DUYดูDEE PREMIUM">

    <!-- ⚡ PERFORMANCE: Critical Asset Preloading -->
    <link rel="apple-touch-icon" href="/assets/logo/DUYDODEE.png">
    <link rel="icon" type="image/png" href="/assets/logo/DUYDODEE.png">
    <link rel="stylesheet" href="/css/output.css">
    <link rel="stylesheet" href="/css/fonts.css">
    
    <!-- 🎨 Lucide Icons -->
    <script src="https://unpkg.com/lucide@0.410.0"></script>
    <meta name="theme-color" content="#050507">
</head>
<body class="bg-brand-black text-white selection:bg-brand-primary/50 min-h-screen flex flex-col overflow-x-hidden">

    <!-- 🧭 Minimal Navbar -->
    <nav class="h-20 z-[500] absolute top-0 left-0 right-0 nav-glass">
        <div class="container mx-auto px-6 h-full flex items-center justify-center md:justify-start">
            <a href="/" class="flex items-center gap-3 group">
                <img src="/assets/logo/DUYDODEE.png" alt="DUYดูDEE Logo" class="w-10 h-10 rounded-xl shadow-2xl group-hover:scale-105 transition-transform duration-500">
                <span class="text-2xl font-heading font-black text-white tracking-tighter uppercase">DUY<span class="text-brand-primary">ดูDEE</span></span>
            </a>
        </div>
    </nav>

    <!-- 🌌 Cinematic Background -->
    <div class="fixed inset-0 z-0 pointer-events-none">
        <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1574267432553-4b4628081c31?q=80&w=2066&auto=format&fit=crop')] bg-cover bg-center opacity-20 grayscale-[0.5]"></div>
        <div class="absolute inset-0 bg-gradient-to-br from-brand-black via-brand-black/90 to-transparent"></div>
        <div class="absolute inset-0 bg-[radial-gradient(circle_at_50%_50%,rgba(251,191,36,0.05),transparent_70%)]"></div>
    </div>

    <main class="relative z-10 flex-grow flex items-center justify-center p-6 md:p-12">
        <div class="w-full max-w-[440px] animate-slide-up">
            
            <!-- 🧊 Forgot Password Card -->
            <div class="bg-black/40 backdrop-blur-md border border-brand-primary/20 p-8 md:p-10 space-y-8 relative overflow-hidden group">
                <div class="absolute -top-24 -left-24 w-48 h-48 bg-brand-primary/10 blur-[80px] rounded-full group-hover:bg-brand-primary/20 transition-all duration-1000"></div>
                
                <div class="text-center space-y-3 relative z-10">
                    <div class="w-20 h-20 bg-brand-primary/10 rounded-3xl flex items-center justify-center mx-auto mb-6 border border-brand-primary/20 shadow-inner group-hover:scale-110 transition-transform duration-500">
                        <i data-lucide="key-round" class="w-10 h-10 text-brand-primary"></i>
                    </div>
                    <h1 class="text-3xl md:text-4xl font-black text-white italic tracking-tighter uppercase Thai-font">
                        RESET <span class="text-brand-primary">PASSWORD</span>
                    </h1>
                    <p class="text-gray-400 text-sm font-medium Thai-font">ระบุอีเมลของคุณเพื่อรับลิงก์ตั้งรหัสผ่านใหม่</p>
                </div>

                <form id="forgot-form" class="space-y-6 relative z-10">
                    <div class="space-y-2">
                        <label for="email" class="text-[10px] font-black text-gray-500 uppercase tracking-widest ml-1">อีเมลที่ใช้สมัคร</label>
                        <div class="relative group/input">
                            <i data-lucide="mail" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-600 group-focus-within/input:text-brand-primary transition-colors"></i>
                            <input type="email" id="email" autocomplete="email" class="w-full bg-black/40 border border-white/5 rounded-2xl py-3.5 pl-12 pr-4 text-white text-sm outline-none focus:border-brand-primary/50 focus:bg-black/60 transition-all Thai-font placeholder-gray-700" placeholder="example@mail.com" required>
                        </div>
                    </div>

                    <button type="submit" class="btn-primary w-full !mt-10 py-4 shadow-[0_0_20px_rgba(251,191,36,0.2)] hover:shadow-[0_0_30px_rgba(251,191,36,0.4)] flex items-center justify-center gap-2">
                        <span>ส่งลิงก์กู้คืนรหัสผ่าน</span>
                        <i data-lucide="send" class="w-4 h-4"></i>
                    </button>
                </form>

                <div class="pt-4 text-center relative z-10">
                    <a href="/login.html" class="inline-flex items-center gap-2 text-[10px] font-black text-gray-500 hover:text-brand-primary transition-colors uppercase tracking-widest group/back">
                        <i data-lucide="arrow-left" class="w-3 h-3 transition-transform group-hover/back:-translate-x-1"></i>
                        กลับไปหน้าเข้าสู่ระบบ
                    </a>
                </div>
            </div>
        </div>
    </main>

    <footer class="border-t border-white/5 bg-brand-black/50 pt-12 pb-8 mt-auto relative z-10">
        <div class="container mx-auto px-6 text-center">
            <div class="flex flex-col items-center gap-6">
                <div class="flex items-center gap-3">
                    <img src="/assets/logo/DUYDODEE.png" alt="DUYดูDEE Logo" class="w-10 h-10 rounded-xl">
                    <span class="text-2xl font-black text-white tracking-tighter uppercase">DUY<span class="text-brand-primary">ดูDEE</span></span>
                </div>
                <div class="flex flex-wrap justify-center gap-8 text-[9px] font-black uppercase tracking-[0.2em] text-gray-600">
                    <a href="#" class="hover:text-brand-primary transition-all">Privacy Policy</a>
                    <a href="#" class="hover:text-brand-primary transition-all">Terms of Service</a>
                    <a href="#" class="hover:text-brand-primary transition-all">Contact Us</a>
                </div>
                <p class="text-gray-800 text-[8px] font-black uppercase tracking-[0.4em]">© 2026 DUYดูDEE ENTERTAINMENT. ALL RIGHTS RESERVED.</p>
            </div>
        </div>
    </footer>

    <script type="module">
        import { auth, sendPasswordResetEmail } from './src/services/firebase.js';
        import { UI } from './src/components/ui.js';
        
        lucide.createIcons();
        const form = document.getElementById('forgot-form');
        form.onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            UI.setLoading(true);
            try {
                await sendPasswordResetEmail(auth, email);
                UI.showToast("ระบบได้ส่งลิงก์กู้คืนรหัสผ่านไปที่อีเมลของคุณแล้ว", "success");
                form.reset();
            } catch (err) {
                UI.showToast("ไม่พบข้อมูลอีเมลนี้ในระบบ", "error");
            } finally {
                UI.setLoading(false);
            }
        };
    </script>
</body>
</html>
