<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>กู้คืนรหัสผ่าน | DUYดูDEE PREMIUM</title>
    <link rel="stylesheet" href="/css/output.css">
    <link rel="stylesheet" href="/css/fonts.css">
    <link rel="icon" type="image/png" href="/assets/logo/DUYDODEE.png">
    <script src="https://unpkg.com/lucide@0.410.0"></script>
</head>
<body class="bg-brand-black text-gray-200 selection:bg-brand-primary/30">

    <nav class="nav-glass h-16 md:h-20 z-[500] sticky top-0">
        <div class="container mx-auto px-6 h-full flex items-center justify-between">
            <a href="/" class="flex items-center gap-3 group">
                <img src="/assets/logo/DUYDODEE.png" alt="DUYดูDEE Logo" class="w-10 h-10 rounded-lg shadow-xl group-hover:scale-105 transition-transform">
                <span class="text-2xl font-heading font-black text-white tracking-tighter uppercase">DUY<span class="text-brand-primary">ดูDEE</span></span>
            </a>
        </div>
    </nav>

    <main class="min-h-[80vh] flex items-center justify-center p-6">
        <div class="w-full max-w-md space-y-8 animate-slide-up">
            <div class="text-center space-y-4">
                <div class="inline-flex items-center justify-center w-20 h-20 rounded-3xl bg-brand-primary/10 border border-brand-primary/20 shadow-2xl mb-4">
                    <i data-lucide="key-round" class="w-10 h-10 text-brand-primary"></i>
                </div>
                <h1 class="text-3xl font-black text-white Thai-font uppercase tracking-tight">กู้คืนรหัสผ่าน</h1>
                <p class="text-gray-500 text-sm Thai-font">ระบุอีเมลของคุณเพื่อรับลิงก์ตั้งรหัสผ่านใหม่</p>
            </div>

            <div class="glass-premium p-8 !rounded-[2.5rem] space-y-6">
                <form id="forgot-form" class="space-y-6">
                    <div class="space-y-2">
                        <label for="email" class="text-[10px] font-black text-gray-600 uppercase tracking-widest ml-2">อีเมลที่ใช้สมัคร</label>
                        <input type="email" id="email" class="w-full bg-black/40 border border-white/10 rounded-2xl py-4 px-6 text-white outline-none focus:border-brand-primary/50 transition-all Thai-font" placeholder="example@mail.com" required>
                    </div>
                    <button type="submit" class="w-full py-5 bg-brand-primary text-black font-black uppercase tracking-widest rounded-2xl shadow-lg shadow-brand-primary/20 hover:scale-[1.02] transition-transform active:scale-95">
                        ส่งลิงก์กู้คืนรหัสผ่าน
                    </button>
                </form>
                
                <a href="/login.html" class="block text-center text-[10px] font-black text-gray-500 hover:text-brand-primary transition-colors uppercase tracking-widest">
                    <i data-lucide="arrow-left" class="w-3 h-3 inline-block mr-1"></i> กลับไปหน้าเข้าสู่ระบบ
                </a>
            </div>
        </div>
    </main>

    <footer class="py-12 text-center opacity-30">
        <p class="text-[9px] font-black uppercase tracking-[0.5em]">© 2026 DUYดูDEE PREMIUM. ALL RIGHTS RESERVED.</p>
    </footer>

    <script type="module">
        import { auth, sendPasswordResetEmail } from '/src/services/firebase.js';
        import { UI } from '/src/components/ui.js';

        lucide.createIcons();
        const form = document.getElementById('forgot-form');
        form.onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            UI.setLoading(true);
            try {
                await sendPasswordResetEmail(auth, email);
                UI.showToast("ระบบได้ส่งลิงก์กู้คืนรหัสผ่านไปที่อีเมลของคุณแล้ว", "success");
                form.reset();
            } catch (err) {
                UI.showToast("ไม่พบข้อมูลอีเมลนี้ในระบบ", "error");
            } finally {
                UI.setLoading(false);
            }
        };
    </script>
</body>
</html>
