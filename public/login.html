<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <meta property="og:image" content="https://duydodeesport.web.app/assets/logo/DUYDODEE.png?v=2">
    <meta property="og:image:secure_url" content="https://duydodeesport.web.app/assets/logo/DUYDODEE.png?v=2">

    <!-- ⚡ PERFORMANCE: Critical Asset Preloading -->
    <link rel="apple-touch-icon" href="/assets/logo/DUYDODEE.png">
    <link rel="icon" type="image/png" href="/assets/logo/DUYDODEE.png">

</head>
<body class="bg-brand-black text-gray-200 selection:bg-brand-primary/30 min-h-screen flex flex-col overflow-x-hidden">

    <!-- 🧭 Minimal Navbar for Login -->
    <nav class="h-20 z-[500] absolute top-0 left-0 right-0">
        <div class="container mx-auto px-6 h-full flex items-center justify-center md:justify-start">
            <a href="/" class="flex items-center gap-3 group">
                <img src="/assets/logo/DUYDODEE.png" alt="DUYดูDEE Logo" class="w-10 h-10 rounded-xl shadow-2xl group-hover:scale-105 transition-transform duration-500">
                <span class="text-2xl font-heading font-black text-white tracking-tighter uppercase">DUY<span class="text-brand-primary">ดูDEE</span></span>
            </a>
        </div>
    </nav>

    <!-- 🌌 Cinematic Background -->
    <div class="fixed inset-0 z-0 pointer-events-none">
        <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1574267432553-4b4628081c31?q=80&w=2066&auto=format&fit=crop')] bg-cover bg-center opacity-20 grayscale-[0.5]"></div>
        <div class="absolute inset-0 bg-gradient-to-br from-brand-black via-brand-black/90 to-transparent"></div>
        <div class="absolute inset-0 bg-[radial-gradient(circle_at_50%_50%,rgba(251,191,36,0.05),transparent_70%)]"></div>
    </div>

    <main class="relative z-10 flex-grow flex items-center justify-center p-6 md:p-12">
        <div class="w-full max-w-[440px] animate-slide-up">
            
            <!-- 🧊 Login Card -->
            <div class="glass-premium p-8 md:p-10 space-y-8 relative overflow-hidden group">
                <!-- Decorative Light Beam -->
                <div class="absolute -top-24 -left-24 w-48 h-48 bg-brand-primary/10 blur-[80px] rounded-full group-hover:bg-brand-primary/20 transition-all duration-1000"></div>
                
                <div class="text-center space-y-3 relative z-10">
                    <h1 class="text-3xl md:text-4xl font-black text-white italic tracking-tighter uppercase Thai-font">
                        WELCOME <span class="text-brand-primary">BACK</span>
                    </h1>
                    <p class="text-gray-400 text-sm font-medium Thai-font">ลงชื่อเข้าใช้เพื่อรับชมความบันเทิงระดับพรีเมียม</p>
                </div>

                <form id="login-form" class="space-y-5 relative z-10">
                    <div class="space-y-2">
                        <label for="email" class="text-[10px] font-black text-gray-500 uppercase tracking-widest ml-1">อีเมลผู้ใช้งาน</label>
                        <div class="relative group/input">
                            <i data-lucide="mail" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-600 group-focus-within/input:text-brand-primary transition-colors"></i>
                            <input type="email" id="email" autocomplete="email" class="w-full bg-black/40 border border-white/5 rounded-2xl py-3.5 pl-12 pr-4 text-white text-sm outline-none focus:border-brand-primary/50 focus:bg-black/60 transition-all Thai-font placeholder-gray-700" placeholder="example@mail.com" required>
                        </div>
                    </div>

                    <div class="space-y-2">
                        <div class="flex justify-between items-center ml-1">
                            <label for="password" class="text-[10px] font-black text-gray-500 uppercase tracking-widest">รหัสผ่าน</label>
                            <a href="/forgot-password.html" class="text-[10px] font-bold text-brand-primary hover:underline transition-all">ลืมรหัสผ่าน?</a>
                        </div>
                        <div class="relative group/input">
                            <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-600 group-focus-within/input:text-brand-primary transition-colors"></i>
                            <input type="password" id="password" autocomplete="current-password" class="w-full bg-black/40 border border-white/5 rounded-2xl py-3.5 pl-12 pr-4 text-white text-sm outline-none focus:border-brand-primary/50 focus:bg-black/60 transition-all Thai-font placeholder-gray-700" placeholder="••••••••" required>
                        </div>
                    </div>

                    <button type="submit" class="btn-primary w-full !mt-10 py-4 shadow-[0_0_20px_rgba(251,191,36,0.2)] hover:shadow-[0_0_30px_rgba(251,191,36,0.4)] flex items-center justify-center gap-2">
                        <span>เข้าสู่ระบบ</span>
                        <i data-lucide="chevron-right" class="w-4 h-4"></i>
                    </button>
                </form>

                <div class="relative flex items-center justify-center py-2 relative z-10">
                    <div class="flex-grow border-t border-white/5"></div>
                    <span class="text-[10px] font-black text-gray-700 uppercase tracking-[0.3em] mx-6">OR CONTINUE WITH</span>
                    <div class="flex-grow border-t border-white/5"></div>
                </div>

                <button id="google-login-btn" class="w-full py-4 bg-white/5 hover:bg-white/10 border border-white/10 rounded-2xl flex items-center justify-center gap-3 transition-all duration-300 group/google relative z-10">
                    <svg class="w-5 h-5 transition-transform group-hover/google:scale-110" viewBox="0 0 24 24">
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.16l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.16H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.84l3.66-2.75z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    </svg>
                    <span class="text-xs font-bold text-gray-300 group-hover/google:text-white transition-colors">Sign in with Google</span>
                </button>
            </div>

            <p class="text-center text-sm text-gray-500 mt-10 Thai-font">
                ยังไม่มีบัญชีสมาชิก? <a href="/register.html" class="text-brand-primary font-black hover:underline underline-offset-4 ml-1">สมัครฟรีที่นี่</a>
            </p>
        </div>
    </main>

    <footer class="relative z-10 py-10 text-center">
        <p class="text-[10px] font-black text-gray-600 uppercase tracking-[0.6em]">© 2026 DUYดูDEE PREMIUM. ALL RIGHTS RESERVED.</p>
    </footer>

        // Initialize Lucide icons
        lucide.createIcons();
