<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>โปรไฟล์ของฉัน | DUYดูDEE-HD</title>
    <meta name="description"
        content="จัดการข้อมูลส่วนตัวและตรวจสอบประวัติการรับชมภาพยนตร์และซีรีส์ของคุณบน DUYดูDEE-HD">
    <meta name="robots" content="noindex, nofollow"> <!-- แนะนำให้ใส่หากเป็นหน้าส่วนตัว -->
    <link rel="canonical" href="https://duydodeesport.web.app/profile.html">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        .Thai-font {
            font-family: 'Kanit', sans-serif;
        }
    </style>
</head>

<body class="bg-brand-black text-white Thai-font">
    <nav id="main-nav"
        class="fixed top-0 inset-x-0 z-[1000] px-6 py-4 flex items-center justify-between transition-all"></nav>

    <main class="pt-32 pb-20 px-6 container mx-auto max-w-6xl">
        <!-- Profile Header -->
        <section class="mb-16 bg-white/[0.02] border border-white/5 rounded-3xl p-8 md:p-12 relative overflow-hidden">
            <div class="flex flex-col md:flex-row items-center gap-8 relative z-10">
                <div class="relative group">
                    <img id="user-avatar" src="" alt="รูปโปรไฟล์ผู้ใช้งาน"
                        class="w-32 h-32 rounded-3xl object-cover border-2 border-brand-primary/20 shadow-2xl">
                    <div
                        class="absolute inset-0 bg-black/40 rounded-3xl opacity-0 group-hover:opacity-100 flex items-center justify-center transition-all cursor-pointer">
                        <i data-lucide="camera" class="w-6 h-6"></i>
                    </div>
                    <input type="file" id="avatar-input" class="hidden" accept="image/*" aria-label="อัปโหลดรูปโปรไฟล์">
                </div>
                <div class="text-center md:text-left flex-1">
                    <h1 id="user-name" class="text-3xl font-black italic uppercase tracking-tighter mb-2">---</h1>
                    <p id="user-email" class="text-gray-500 text-sm mb-6 uppercase tracking-widest font-bold">---</p>

                    <div class="flex flex-wrap gap-3 justify-center md:justify-start">
                        <button id="edit-name-btn"
                            class="px-6 py-2.5 bg-white/5 hover:bg-white/10 border border-white/10 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all">แก้ไขชื่อ</button>
                        <button id="enable-notifications-btn"
                            class="px-6 py-2.5 bg-brand-primary/10 hover:bg-brand-primary/20 border border-brand-primary/20 text-brand-primary rounded-xl text-[10px] font-black uppercase tracking-widest transition-all flex items-center gap-2">
                            <i data-lucide="bell" class="w-3 h-3"></i> เปิดแจ้งเตือนหนังใหม่
                        </button>
                        <button id="logout-btn"
                            class="px-6 py-2.5 bg-red-500/10 hover:bg-red-500/20 border border-red-500/20 text-red-500 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all">ออกจากระบบ</button>
                    </div>
                </div>
            </div>
            <!-- Decoration -->
            <div class="absolute top-0 right-0 w-64 h-64 bg-brand-primary/5 rounded-full blur-3xl -mr-32 -mt-32"></div>
        </section>

        <!-- Viewing History -->
        <section>
            <div class="flex items-center justify-between mb-8">
                <h2 class="text-xl font-black italic uppercase tracking-tighter">ประวัติการรับชมล่าสุด <span
                        class="text-brand-primary">●</span></h2>
                <button id="clear-history-btn"
                    class="text-[10px] text-gray-500 hover:text-red-500 font-bold uppercase tracking-widest transition-colors">ล้างประวัติทั้งหมด</button>
            </div>
            <div id="history-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-6 md:gap-8">
                <!-- Content -->
            </div>
        </section>
    </main>

    <!-- Edit Modal -->
    <div id="edit-modal"
        class="hidden fixed inset-0 z-[2000] bg-black/80 backdrop-blur-sm items-center justify-center p-6">
        <div class="bg-brand-obsidian border border-white/10 rounded-3xl p-8 max-w-sm w-full">
            <h3 class="text-lg font-black italic uppercase mb-6">แก้ไขข้อมูลส่วนตัว</h3>
            <div class="space-y-4">
                <div class="space-y-2">
                    <label for="new-name-input" class="text-[10px] font-bold text-gray-500 uppercase">ชื่อแสดงผล</label>
                    <input id="new-name-input" type="text" placeholder="ระบุชื่อแสดงผลใหม่"
                        class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm outline-none focus:border-brand-primary transition-all">
                </div>
                <div class="flex gap-2 pt-4">
                    <button id="cancel-edit-btn"
                        class="flex-1 py-3 bg-white/5 rounded-xl text-xs font-black uppercase">ยกเลิก</button>
                    <button id="save-profile-btn"
                        class="flex-1 py-3 bg-brand-primary text-black rounded-xl text-xs font-black uppercase">บันทึก</button>
                </div>
            </div>
        </div>
    </div>

    <div id="main-footer"></div>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="module" src="/src/pages/profile.js"></script>
</body>

</html>
